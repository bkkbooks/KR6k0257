body:
  text: 律苑事規要語序翰林侍講學士奉政大夫知制誥同修國史袁桷撰余居鄰開元寺其戒壇精嚴肅靜過者莫不悚息間遇度僧必一往閲之見其結跏藉草持悕畏想口誦加護不絶天神炳靈至有登壇仆絶不能終事者繇是錐獰夫忞子率罔敢廢懈噫使嘗持是心安有所謂地獄也耶悟心源律師定上壇結界等儀式願廣施諸方使人人如初受具足戒時清淨法海與大雄氏告衆無異不然破律犯戒罪劫可勝道哉泰定元年中元日清容居士袁捔書杭州路明慶大興國寺律藏事規備用要語皆宗門之柱石垣藩也四明悟公心源宗師篤於前明慶虎巖宗主一囑苦心二十年圓成二書𨤲為十卷凡十餘萬言繼志述事固有其人奈工木之費頗夥必藉諸大賢明在家出家菩薩喜開施鑰同成勝事佛三寶有僧有法猶禮樂制度皆是良心律一宗作矩作規故行住坐臥無非大道奈慈苑之廣莫致芳派之芒洋百丈掇拾𮨇而之它二祖鈔疏有不能用今則挈爾要領會其旨歸既間花野草各自春風動搖俾殢雨癡雲不礙山色清淨十萬餘字多多益辨千二百衆井井有條運象長者才肯點頭雕龍工夫方敢下手法既周遍福不唐捐泰定二年三月日疏幹緣智觀文郁勸緣明慶住持宗主都勸緣南山澄祖師菩薩百丈大智禪師採取律制以為禪林清規舉世盛行而吾家律學者及不及焉然南山靈芝二祖撰鈔疏記文積有年矣至宋咸淳間前明慶寂堂思律師奏準入藏遍行天下實有大功於吾宗也惜乎行事儀式曾未著述每承前住大明慶虎巖宗主纍書諄諄囑令遍集近至武林散般若關法會新住明慶𣇄湖宗師大耆舊子永文郁智觀又請器筆其志甚專是皆律苑龍象也於是再披鈔疏及咨詢律海造并參禪林軌式編成律苑事規并備用要語計十萬餘字今併入梓庶可以為後人法則但省悟學識淺陋尚慮缺遺倘木高見宿學改而正之及補諸未足此省悟之所深望也泰定乙丑中元前五日四明演忠住山省悟書律苑事規目録卷之一天結界儀卷之二地落髮儀玄受具戒策發儀黃受五戒儀宇受十戒儀宙上壇儀附加衣説淨卷之三洪布薩儀卷之四荒安居儀日自恣儀附鉢位圖卷之五月聖節啓建滿散并牌式盈聖節宦請開講昃千秋節開講辰聖節祝香宿聖節放生列日月蝕祝香伏願張請雨祈晴祝香伏願寒大殿藏殿旦望祝聖來朝廷祈禱暑如來降誕往如來涅槃成道秋盂蘭盆供收南山靈芝祖忌冬開山祖忌藏諸祖忌閏嗣法師忌餘九祖頌成送法衣卷之六歲專使請住持律西堂頭首住持呂頭首受嗣法調煎點住持當代陽煎點西堂頭首新命雲山門官待新命當代專使騰西堂頭首受命官待致辭衆上座茶湯雨見職頭首辭衆露入院古法結入院新法為庫司諸新住持齋霜開堂祝聖金新命巡寮生僧堂持為茶湯麗檀越諷經水官待專使玉留請兩班出參訪出入崑交割什物岡方丈小座湯卷之七劒煎點住持號兩班寢堂煎點巨諸山寢堂煎點闕尊宿相訪珠諸山相訪稱官員相訪夜施主齋僧光請名德都講果兩班進退珍挂鉢請知事李侍者進退奈方丈特為新舊兩班湯菜官待新舊兩班重住持垂訪點茶芥方丈特為新首座茶薑諸莊監收海頭首寮交割什物卷之八鹹住持河前堂淡後堂鱗都監寺潛懺首羽維那翔知客龍知浴師知殿火侍者燒香書狀請客衣鉢直日帝列項職員副寺典座直歲莊主化主水頭炭頭磨頭園頭樹頭淨頭鳥百繩大規繩官日用清規人十威儀頌卷之九皇當代住持涅槃始遺囑遺書制龕入文主喪字請佛事乃移龕服挂真舉哀致祭奠茶湯衣祭次裳對靈䇿發奠茶湯推出喪挂真奠茶湯位秉炬挂真遜入塔國全身入塔有唱衣虞官待陶孝服唐兩班悼住持吊上祭資次民念誦諸式宿夜起龕化檀公身入塔法嗣小師入塔誦經伐遺囑式罪佛事資次周估唱衣單等式發下遺書商嗣法師遺書至并遺書式湯住持後事坐病僧圓寂朝浴亡問諷經道分剽垂請佛事抄劄拱鎖龕諷經致寮平出喪章荼毗愛唱衣育入塔梨亡僧後事首念誦式保病病重初夜起龕荼毗唱衣臣口詞仗衣單式戎俵經錢榜式差三等板帳卷之十遐相看邇西堂首座挂塔一諸法名勝挂塔體法眷辨事挂塔卛新來挂塔門狀式賓方丈回禮歸謝挂塔茶王參堂遷齋狀式鳴請益禮師鳳開講在參講樹晨朝禮白施主駒普回向食四節土地堂回向場楞嚴普回向化日用偈章被歲旦元宵祈禱草青苗祈禱木秉白梵音聲圖賴行堂諸儀及警衆法器付月分須知
