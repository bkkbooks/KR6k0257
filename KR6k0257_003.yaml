body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述洪布薩儀若新受戒人廣誦者須預請住持作羯磨并答法人又須和會行事等七人及證戒本一人若夏中常説者維那須於每月初八二十三日出差説戒人牌挂僧堂右頰此差不問已來歷職事須肩次輪流如有私假公出病緣及不能秉説之人並須自行和會人代之毋得臨時失事本律説戒犍度初明先廣後略次第八段於相易曉後明先略後廣三五説戒皆為八難餘緣來有緩急致有要心五階不同前四階略第五階廣説者不可云略然而同是難緣某來猶遠要心廣説故廣説之不同無難而廣説也今時説戒前後中間廣略不定一夏足經一卷雖鈔主義立寒熱二緣略説而非一席之間有中廣三十前略十三後略九十等例此略不出律制其弊久矣久則難變且依舊出説戒秉白上差下梵音亦上差下行事四人下差上今時多是和會白黑月説戒開寫某甲律師梵音某甲律師秉白某甲律師今月日堂司比丘某甲咨稟一四月黑月廣四重餘略二五月白月廣十三二不定餘略三五月黑月廣三十餘略四六月白月廣九十提舍餘略五六月黑月廣衆學餘略六七月白月不説戒閏白月廣四重至三十餘略閏黑月廣九十至衆學餘略説戒行事開寫某甲律師某甲律師某甲律師某甲律師今月日堂司比丘某甲咨稟住持亦須預和會首座或老成人答法至説戒前一日晚維那令堂司行者請説戒七人獻湯如常戒至參前維那令直殿人灑掃法堂仍令行僕兩邊挑燈暑月不宜湫隘及排住持位於佛左置槌於佛右參罷維那令堂司行者於大香爐前排手爐花柈籌匣水盂湯盂手巾并架如常鋪説仍置一蒲團於香爐前中間先一日晚喝頭火後維那令堂司行者繞廊疏疏打引報云習行事法堂點燭衆集坐定堂司行者擎湯茶柈柈中點燭燒香行僕行盞行湯湯罷却習行事加行事人或音聲未諳進止有乖維那與老成人須再三依式教之莫待臨時有失觀瞻先習者為此也習了維那囑堂司行者收拾物件至來日早粥直日人僧堂鳴槌一下白云大德僧聽今白黑月巳日衆僧和合辰申時就講堂説戒次如常法回向粥了少歇維那親到法堂點視香花籌水等件件鋪設如儀又令堂司行者往説戒人處取香爐花瓶燭臺及燭排法座上又令門子挂説戒牌於山門外東首今多挂法堂上又令直殿人上諸殿堂香燈却令堂司行者覆頭首住持打起繞廊打小板次打大鐘踈踈打之大衆繞諸殿堂燒香集僧堂前依戒次一一問訊叉手而立威儀整肅毋得語笑頭首亦依戒次而立秉白人及行事四人在沙彌下肩立唯直日人面對首座叉手而立候住持至殺鐘即打鼓鼓絶直日人打引二下維那舉集僧聞鐘偈云云如結界中大衆皆合掌誦之直日人打引二下略問訊於住持前行疏疏打引僧衆鴈行至講堂香爐前住持問訊大衆次第各問訊此初入堂表所敬也住持歸位立大衆一一就位東西兩行而立待齊打引二下衆齊問訊展具三拜隨拜打引衆各互跪直日人未可拜維那拳入堂偈云云如結界中但改結界為布薩衆誦偈了打引二下齊收具而立引二下衆齊問訊攝衣置具而坐直日人方展具三拜問訊坐定秉白人及行事四人便起身整肅威儀齊問訊秉白人先行行事四人亦庠序而行至香爐前秉白人在中間立行事第一人在秉白右立第二人左立第三人又右立第四人又左立如是相間作一行問訊叉手而立秉白自問訊回身東繞至水盂前立略問訊互跪誦水偈云八功德水淨諸塵盥掌去垢心無染執持禁戒無缺犯一切衆生亦如是盥手拭巾下皆例此偈了起身問訊向西行至湯盂前行事第一人亦同問訊回身至水盂前二人須瞻顧緊緩相待一同略問訊互跪秉白誦湯偈云香湯熏沐澡諸垢法身具足五分充般若圓照解脫滿群生同會法界融盥拭手巾下皆例之偈了第一人誦水偈如上偈了一齊起身第二人亦同問訊秉白歸元立處第一人亦隨行至湯盂前第二人亦繞至水盂前三人一齊問訊如是次第相顧問訊説偈盥掌各要齊整至第四人才歸位便一齊問訊三步進前略問訊互跪取籌及執湯水盂手巾角秉白人舉浴籌偈於左右以湯水浴籌云羅漢聖僧衆凡夫衆和合香湯浴淨籌布薩度衆生大衆皆合掌誦之偈了五人各執籌木湯巾一齊起身略手朝三步倒退立定亦齊手朝執湯人先回身行至槌所揭槌袱浴槌執巾人亦隨至以巾拂槌二人繞槌回至元立處秉白人即往槌所立擎水人亦先回身至住持前半跪以水灑手住持誦水偈如前執巾人亦往半跪授巾拭手擎湯人與執巾人至禮亦如上住持誦湯偈如前其擎水擎湯并二執巾人次第至第一座前灑手授巾循行而去衆各誦水湯二偈盥手拭巾既了四人仍回香爐前立定手朝三步進前略手朝半跪置巾於元處令其整齊二盂亦置元處一齊起身略問訊三步退問訊第四人先行次第各歸元位問訊而坐秉白人鳴槌一下云大德僧聽衆中誰小小者收護行事第四人聞白誰小小者便起身問訊至秉白人後問訊離四五尺許叉手而立秉白人再鳴槌一下云大德僧聽外有清淨大沙門入若有客比丘皆集此處再鳴椎一下云大德僧聽此衆小者已收護外清淨大沙門已入內外寂靜無諸難事堪可行籌廣作布薩我某甲比丘為僧行籌作布薩事僧當一心念作布薩願上中下座各次第如法受籌白了便離槌所向南行舉云并受囑授人籌收護人而徐徐行秉白人至住持前互跪授籌一條與住持住持雙手受之誦受籌偈云金剛無礙解脫籌難得難遇如今果我今頂戴歡喜受一切衆生亦如是收護人亦至住持前胡跪雙手接籌住持誦還籌偈云具足清淨受此籌具足清淨還此籌堅固喜捨無缺犯一切衆生亦如是秉白人先至第一座前次第循行分籌而去若受欲人須受二籌大衆各各受籌誦受籌偈如上收籌人亦至第一座前次第一一收籌衆各一一還籌及誦還籌偈如上秉白人最後分直日人籌了至西南角向西立收籌人亦收了對秉白人向東立齊手朝互跪秉白人以右手擎籌一條誦受籌偈如上又誦還籌偈如上遞籌與收籌人秉白人又授一籌與之收籌人亦手擎籌并誦受還二偈起身手朝秉白人回至槌所收籌人亦同回元立處便急數籌數而點記之初收籌時亦當先記數庶得無差若沙彌收籌而後亦再如上行之秉白鳴椎一下云次行沙彌籌白了便徐行云沙彌籌若有沙彌亦次第分籌還籌并誦偈無則不須也收籌人便行過秉白人前至住持前互跪白云大僧幾人若有沙彌則云沙彌幾人無沙彌則云大僧幾人沙彌無籌與住持了起身略問訊便達法座歸位而坐秉白人至住持前互跪住持告云此一住處一布薩大僧幾人有沙彌則云沙彌幾人無沙彌則云大僧幾人沙彌無住持付籌與了起身問訊回身至香爐前立略手朝三步進前手朝互跪安籌於匣內起身略問訊三步退後問訊回至槌所鳴椎一下合掌白云大德僧聽此一住處一布薩大僧幾人若有沙彌則云沙彌幾人都合幾人無沙彌不須此二句各於佛法中清淨出家和合布薩上順佛教中報四恩下為含識白了至元坐處取坐具置臂上徐行舉云各誦律中清淨妙偈衆皆合掌誦云清淨如滿月清淨得布薩身口業清淨爾乃應布薩秉白人從容至住持前問訊展具偈恰了互跪合掌白云大德慈悲為衆説戒住持答云此説戒事任當某甲但以年老識性昏昧誦文不通恐惱於僧衆中有某甲律師能誦往彼告云僧差説戒便收具問訊從座後至説戒人前須預如説戒人坐處問訊叉手告云僧差説戒説戒人亦合掌坐而受之秉白人還至椎所鳴槌一下白云大德僧聽僧差某甲説戒人名律師為衆説戒梵音某甲梵音人名律師升高座説戒人聞僧差二字即起身臂坐具袖香合問訊至香爐前燒三捻香略問訊轉身又問訊展具三拜須候秉白緩急白聲才絶起身互跪云小比丘某甲稽首和南敬白衆僧僧差説戒恐有錯誤願同誦者指授起身一拜收具問訊至住持前問訊次至法座前略問訊登座於座上爐前問訊燒香三捻放香合又問訊置坐具於坐處轉身問訊跏趺而坐行事第二第三第四人同起身問訊第二人至爐前中立第三至右立第四至左立一齊問訊三步進前略問訊互跪第二人取花柈左右二人執湯盂水盂起身略手朝三步退後叉手朝且以寺門向南為例擎水人便先東行二人皆隨行灑水散花灑湯秉白人舉云散花説偈云云如結界中大衆皆合掌誦之秉白人鳴椎一下衆皆合掌梵音云稽首禮諸佛及法比丘僧今演毗尼法令正法久住優波離為首及餘身證者令説戒要義諸賢咸共聽散花三人繞法座滿堂散之如目恣儀中回至東南角三人旋繞𣇄立互跪散花人須向南擎湯人略傾湯於水盂中擎水人置水盂於花柈上一齊起身散花人便乃却行灑水散花填於中間擎湯水二人同至香爐前一齊問訊三步進前略問訊互跪置湯盂於元處起身略問訊三步退後問訊第四人先行共歸位問訊而坐填花人至東南角轉身以花柈向北朝之回至香爐前手朝三步進前略朝互跪置花柈水盂於元處起身略問訊三步退後問訊歸位而坐行事第一人候梵音作諸賢二字便起身持坐具袖香合問訊至香爐前又問訊不用大爐燒香展具三拜須候梵音恰了方舉身互跪執手爐坐上説戒人亦執手爐秉白舉云傳香説偈偈如結界儀中大衆皆合掌誦之然香人於頭句偈燒三捻香執手爐拜下偈了放手爐起身一拜收具問訊歸位而坐秉白打槌一下亦歸位問訊而坐説戒人執手爐誦云四分戒本序了放手爐住持叉手揖衆衆皆叉手受揖住持問云大德僧聽僧集否問和遣未具索欲如有受欲人即展具互跪合掌白云大德僧聽某甲比丘我受彼欲清淨彼如法僧事與欲清淨一説收具歸位問教誡問何為答云説戒羯磨請證明作單白羯磨並如四分戒本中問成否了云作法既成高座説戒説戒人合掌平聲説戒或有歌聲誦者此是五分廢教誦至七佛略戒大衆齊合掌鳴僧堂前鐘二下召沙彌誦戒人執手爐至後序了起身收具袖香合問訊下座作梵人秉云神仙五通神造設於呪術為彼慚愧者攝諸不慚愧如來立禁戒半月半月説已説戒利益稽首禮諸佛處世界如虗空如蓮花不著水心清淨超於彼稽首禮無上尊説戒人至香爐前秉白與直日人亦起身三人一齊問訊展具三拜秉白先收具至槌所立直日人亦收具於元位立唯説戒人候梵音緩急梵才了起身互跪白云小比丘某甲致敬衆僧足下敬謝衆僧僧差説戒三業不勤多有忘失願僧慈悲施以歡喜起身一拜袖香合收坐具問訊歸元位直日人引二下大衆皆起身袖香合臂坐具立得齊打引二下衆皆問訊展具而立秉白人舉自慶偈云云如結界儀中衆合掌誦偈了秉白鳴槌一下合掌舉云一切恭敬自歸依佛打引衆拜當願衆生體解大道發無上心引一下衆起立槌一下云自歸依法打引衆拜當願衆生深入經藏智惠如海打引衆立槌一下云自歸依僧打引衆拜當願衆生統理大衆上來布薩無限勝因散沾法界和南聖衆引二下衆皆收具立引二下衆皆問訊信直日人踈踈打引大衆自小先行衆至僧堂前於元集處一行而立直日仍在元處立踈踈打引候住持人至引二下衆皆問訊而散維那預令堂司行者就請説戒等七人獻湯如常式仍令堂司行者收拾物件歸寮須一一點視藏之毋使墜失也
