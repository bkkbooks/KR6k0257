body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述杭州大明慶寺住持嗣祖比丘嗣良參訂天結界儀并序結界一事僧衆大綱像季佛法藉以匡持衆同羯磨託為根本蓋因秉御者鮮以致諳練者稀宋咸淳間四明沙門鈍翁文英律師集結界履歷今取其式外撰普説白席祝香結坐語共二十章如備用要語中擬為後學規則不敢以呈達者幸毋誚焉結界唱相人卒難曉今以寺外土墻門閾石標內外稜正四隅方向以寺前左角為始唱之故為二圖初結三界儀第一日辰時先諷誦祈禱未創結之前鳴鐘集衆於大佛殿啓白祈禱誦大悲呪三七遍先呪沙水繞殿散花灑水撒沙次誦楞嚴呪一遍回向天龍三界州縣所屬地界業主前亡後化土境神明等訖僧衆且散午後諷誦祈禱鳴鐘再集衆仍從大殿舉大悲呪散花沙水周遍寺內及繞寺外循大界標相却回土地堂前立定回向伽藍衆聖訖且散此是尚翁宗師如此行之不出律制初受創次第律令日結衆集可悉故今多夜結遊行僧少故初夜打起衆集法堂主法師升高座祝香云云訖坐本寺兩班問訊次諸衆結界出班問訊維那作梵云云訖主法師普説云云如備用要語中畢下座少歇中夜創結三界僧衣食也集衆行事傳香備如布薩儀中大打起集衆就僧堂前立定鼓絶維那舉聞鐘偈曰降伏魔力怨除結盡無餘露地擊犍稚比丘聞當集諸欲聞法人度流生死海聞此妙響音盡當雲集此次第衆集法堂依位立定大展三拜跪誦入外偈曰持戒清淨如滿月身口皎潔無瑕穢大衆和合無違諍爾乃可得同結界衆各收具而坐行事三人起散花水誦偈云散花莊嚴淨光明莊嚴寶花以為帳散衆寶花遍十方供養一切諸如來維那作梵行事一人袖香合持坐具出衆至大香爐前設禮跪爐傳三捻香就拜待梵音絶却擡身胡跪誦偈曰戒香定香解脫香光明雲臺遍法界供艱一切無量佛見聞普薰證寂滅創結大界主法師白席如要語中了云今請某人唱大界相其人答所成法某謹白大德僧聽結大界不許傳欲云云問集問和遣未具主法云某甲比丘起為僧唱四方大界相次唱相師出衆行禮立定唱云大德僧聽我比丘為僧唱四方大界相云云如要語中三唱了唱師復坐主法云僧今和合何所作為答云結大界羯磨師云結大界羯磨仰憑尊衆合掌同心證明成否大德僧聽云云白及羯磨結詞並在羯磨經了云作法既成結界圓滿白及羯磨與結詞皆問答成否下皆例之次創結攝衣界師白席如用語中了云今請某人答所成法某謹白大德僧聽問集問和遣未具索欲問云僧今和合何所作為答曰結攝衣界羯磨大衆同心證明作法大德僧聽云云白及羯磨結詞並在羯磨經後創結攝食界師白席了云今請某人唱淨地相某人答所成法某謹白大德僧聽問集問和遣未具索欲師云某甲比丘為僧唱淨地相唱相師出衆具禮唱云大德僧聽我比丘為僧唱淨地處所云云如羯磨經中三唱訖唱相師復坐師云僧今和合何所作為答云結淨地羯磨師云結淨地羯磨仰憑大衆合掌同心證明作法大德僧聽此住處云云白及羯磨結詞如羯磨經中已上創結僧衣食三種大界竟維那舉處世界梵訖衆念自慶偈云諸佛出世第一快聞法奉行安穩快大衆和合寂滅快衆生離苦安樂快衆僧起立淨地師執手爐云上來恭依律範行結界法事所萃洪因端為祝延皇帝聖壽萬安皇太后皇齊年皇太子睿算千秋文武官僚同增祿算國泰民安時和歲稔不盡良因祝獻護法諸天報答四恩三有伽藍真宰護教安僧法界衆生同成種智為是緣念清淨法身毗盧遮那佛十佛號加南山大智二祖師號至波羅蜜訖衆僧大展三拜行事人打槌唱三歸依如説戒儀中改布薩為結界了衆收具復回僧堂前和南而散第二日解三界創結初夜解三界次第黃昏打起集衆於僧堂前誦入堂偈如前收具就坐行事三人起散花水誦偈如前維那作梵行事一人出衆禮三拜執爐梵訖傳三捻香衆誦偈如前次解淨地及衣僧二界白席羯磨次第而作也初解淨地師白席了云今請某人答所成法某謹白問和索欲等并如前但答云解淨地羯磨詞云大德僧聽此住處共住共布薩白及羯磨結詞如羯摩經中次解攝衣界師白席了云今請某人答所成法某謹白問和索欲并如前但答云解不失衣界羯磨詞云大德僧聽此住處同一住處同一説戒白及羯磨結詞如羯磨經中後解大界師白席了云今請某人答所成法某謹白問和索欲并同前但答云解大界羯磨詞云大德僧聽此住處比丘云云白及羯磨結詞如羯磨經中維那作處世界梵訖衆誦自慶偈如前起立解界師執手爐云云上來恭依律範行解界法事所萃洪因端為祝延聖壽萬安云云如前為是緣念十佛號加二祖師如常畢衆展三拜行事人打椎唱三歸依訖收具仍回僧堂前和南而散正結三界儀中夜正結衣食三界打起集衆於僧堂前誦聞鐘偈如前入法堂設禮誦偈坐定散花水梵音傳香誦偈並如創結中初正結大界師白席了云今請某人唱大界相某人答所成法某謹白問和索欲差唱相人並如前三遍唱訖問何為答云結大界羯磨結界詞語法式前如創結中次正結攝衣界師白席了云今請某人答所成法某謹白問和索欲差唱相人羯磨問答并如創結中正結三界俱了主法人略敘謝結座云云如要語中了維那作處世界梵訖衆念自慶偈起立主法執爐祝聖念佛號並如創經中然後白佛乞聖加被俾界域堅窂等語合衆大展三拜行事人打槌唱三歸依仍回僧堂前和南而散第三日廣誦戒本法式備於布薩儀中今多行此法故附此廣誦一人秉白一人作梵一人行事四人已上結界次第若作法者多可以各分結解白席如只一主法者能餘皆未諳不免從簡於是述白席四章如要語中以擬後用各章羯磨歷別作之所有淨地唱相前隨舊出今例攝衣不唱相故此略之其法式次第今亦列之于后創結攝衣攝食二界總白席了云今請某人答所成法某謹白問和索欲如前總答云結攝衣界羯磨攝食界羯磨先秉結衣界羯磨次秉結攝食界羯磨共解攝食攝衣二界總白席了云今請某人答所成法某謹白問和索欲如前但總答云解攝食界羯磨解攝衣界羯磨先秉解攝食界羯磨次秉解攝衣界羯磨正結攝衣攝食二界總白席了云今請某人答所成法某謹白問和索欲如前總答云結攝衣界羯磨結攝食界羯磨先秉結攝衣界羯磨次秉結攝食界羯磨共解食衣僧三界總白席了云今請某人答所成法某謹白問和索欲如前總答云解淨地羯磨解攝衣界羯磨解大界羯磨先秉解淨地羯磨次秉解攝衣界羯磨後秉解大界羯磨結解戒場儀創結戒場白席了云今請某人唱戒場相某人答所成法某謹白問和索欲唱相師出衆行禮與結大界同唱相羯磨詞語如要語中次解戒場白席了云今請某人答所成法某謹白問和索欲如前但答云解戒場羯磨正結戒場白席了云今請某人唱戒場相某人答所成法某謹白索欲問和唱相師出衆並如創結中但答云結戒場羯磨羯磨詞並如羯磨經中結界資次榜式結大界所且以五人僧資次排定如人多寡隨宜區處第一日午前集衆行道祈禱某寺律師回向齋午後集衆繞寺行道祈禱某寺師回向點心初夜甲寺律師祝香普説中夜乙寺律師創結大界丁寺律師唱相丙寺律師答法丙寺律師創結衣界戊寺律師答法丁寺律師創結淨地戊寺律師唱相乙寺律師答法點心第二日初夜戊寺律師解淨地乙寺律師答法藥食乙寺律師解攝衣界丁寺律師答法丙寺律師唱大界戊寺律師答法點心中夜甲寺律師正結大界丙寺律師唱相乙寺律師答法丁寺律師正結衣界丙寺律師答法戊寺律師正結食界乙寺律師唱相丁寺律師答法藥食湯餅右伏以毗尼藏是佛法延壽命之教經論力微羯磨地之苾芻秉衆法之區自然休弱眷此精藍雖美其何勝法未加欲免宿煮離別之𠎝結攝僧衣食之界天人戴師神龍護持端肅身心宜唱三篇之祕誥專勤呪願堅牢萬載之封疆全始全終毋怠毋匆闡南山宗旨祝北闕睿齡今月日榜
