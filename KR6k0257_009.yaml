body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述皇當代住持涅槃夫世尊示寂諸祖涅槃棺殮有經禮儀有序養生送死儒釋皆宗只如雙林殮以金棺十弟子哭泣憂悔波羅奈釋梵天龍哀號躄踊泪如膏軸迦葉還自外國所恨不覩真像世尊槨示雙趺前後以大自在三昧致金棺於大虗繞拘尸羅城三匝却及闍維八國興兵爭分舍利各歸建塔豈非禮乎然而百丈繩制凡亡僧衣物盡行支破管喪具奏以聞敕入藏為定式世尊住世時有古佛號烏波難陀示迹入滅世尊敕集衆將衣鉢對衆估唱使四衆觀察啓悟此身無常證二果者不勝數蓋對治他緣當修己行先輩遷化紙袋封留法衣一頂備請住持非他事也以表世尊付衣待彌勒應世說法後之來者審所自也始遺囑遺書尊宿示疾遷化可期預請兩班耆舊封定行李僅留浴殮隨身衣服若衣鉢不多遺戒小師不許披麻慟哭請首座主喪一切佛事並免首座同衆舉無常偈衆念首云圓寂堂頭某人和尚即今舉龕將赴茶毗仰憑大衆念諸行無常是生滅法生滅滅已寂滅為樂三遍即起龕茶毗了了明明以驗生平若衣鉢豐儲王臣贈葬須盡禮講行衣鉢只留方丈庫司差公心僕𨽻看守估唱了則己慎勿將無作有空費常住外護檀越諸山道舊遺囑遺書皆先畢事制入龕凡示疾書偈入滅不拘早晚侍者即令客頭行者報兩班諸寮大衆云堂頭和尚傳語大衆風火相逼不及面違堂司行者鳴僧堂前鐘衆集上方丈吊慰未可舉哀首座同兩班耆舊商量請人主喪須擇鄰封先成或法眷尊長或只請首座如有遺命即當遵行孝子侍者親隨人安排洗浴著衣淨髮入龕遺偈貼龕左維那孝子就方丈炷香請首座做入龕佛事安排𥨊堂置龕爐燭几筵供養至時鳴僧堂前鐘集衆舉入龕佛事已維那舉彌陀經回向云切以美權普示分化迹於人天妙體獨存起玄機於於佛祖恭惟堂頭和尚孤圓智月俄𠬧萬水之波廣大悲心却應十方之感瞻顏無地披志有歸是集真徒專誠諷誦佛說阿彌陀經一卷稱念四聖洪號所集功德奉為堂頭和尚無生報地妙極莊嚴十方三世云云再舉經回向云上來諷經功德奉為堂頭和尚崇本位十方三世云云當夜集衆諷經回向二時上粥三時上茶湯大衆諷經見職維那回向文主喪夫主喪者非老成宿德詎可當其請如主喪人至鳴大鐘大衆門迎至龕前炷香了兩班大衆人事衆散兩班耆舊送客位兩班插香人事當辭免主喪主位首座分手首座起身燒香一炷伏位獻茶孝子即排前問訊插香大展三拜次方丈行者禮拜次參頭領衆插香禮三拜次方丈僕從參拜了獻湯送兩班出半齊庫司備點心兩班光伴次第巡寮字諸佛事巡寮已兩班耆舊孝子隨到客位呈衣鉢簿遺墨等物主喪就衣茶議請佛事式列後及請喪司一行人先議孝服無布折量分俵如主喪路遠三日未至請次頭首移龕佛事主喪至須與首座私計衣鉢多少作三分一分俵衆人經錢齊錢謝喪司一行人一分佛事孝服喪司日逐支遣一分做齊出喪諷經須與首座同主其事主喪者只可舉哀對靈二佛事帶行僧行不可干預執職并佛事若衣盂豐甚議請鄰封老成本寺耆舊西堂首座每日俸嚫諷經奠茶湯不拘兩班大耆舊各請一人掌財庶絶浮議接容喪儀亦請耆喪司書記維那知客從衆議公請侍者把帳喪司公差庫司客頭茶頭一行人管事仍請見職維那同議請佛事見職知客門接外客喪司合干人僕排單揭示移龕舉哀乃移龕入龕後三日掩龕庫司措辨事儀法堂上間顏色幃幕嚴設床榻架列受用衣物左右砂羅器具案上列筆硯部文爐瓶供養湯瓶火爐茶湯皿具執從行者看守中間廣設祭筵生絹幃幕鋪設法座掛真以備上備上祭下間置龕床布幃幕座安位牌前列機案素花供養二時下湯茶粥諷經香燭不絶排列挑燈鐃鈸花幡鳴鐘集衆做佛事已移龕下法堂禪規請鎖龕佛事服挂真舉哀致祭奠茶湯移龕已即法堂挂真佛事了侍者捧遺書呈首座主喪大衆云堂頭和尚臨終遺言呈山首座大衆書主喪接書呈首座首座以書爐上薰即授維那讀畢喪司行者貼法堂中間上手幕上主喪白云堂頭和尚歸寂理合舉哀佛事已舉哀三聲大衆發哭孝子列幕下哀泣主喪炷香請奠茶佛事喪主致祭知客宣祭文已請奠茶佛事孝子列真前禮拜已歸幕下主喪再炷香禮真孝子皆答拜主喪入幕下吊慰孝子隨禮三拜次慰兩班大衆詞云法門不幸堂頭和尚遍戢化權敢冀大衆玉成後事首座詞云倚賴和尚玉成後事兩班大衆慰孝子詞云山門不幸和尚歸真望節哀以盡大事衣祭次挂真已喪司具目子列排祭次貼法堂下間幕上式見后每日次或三次上祭諷誦經諸山檀越致祭不在此限也若法眷嗣子上祭備孝服到門內知客接已即報喪司送孝服而後上祭助葬儀物用了餘者當歸常住蓋諸山轎從皆擾常住也喪司集兩班耆舊抄劄衣鉢見數從公議留遺囑外喪司點計新舊短長價貫多少庶臨時成現裳宿夜對靈策發奠茶湯禪規名對靈少參念誦挂真已維那同孝子詣客位拜請主喪逮夜逮夜者則宿夜法堂面真設座對靈䇿發說淨土因緣昏鐘鳴鳴鼓集衆兩班出班如常式無親隨人和會侍者燒香說法了孝子羅拜致祭首座即領龕前上香山門維那舉彌陀經回向式在後兩班奠茶湯致祭別靈次孝子致祭諷經衆散參頭領衆喝參禮拜諷經作下寮參拜聲喏諷經方丈行者參頭大衆參隨人力守夜推出喪挂真奠茶湯喪儀津送之禮應須合節計衣鉢之多寡審天氣之炎涼十日半月取於事辨也知事喪司提調喪儀香亭真亭幢幡唄樂裝習十大弟子列龕哀哭龕前傘椅書籠湯爐排燈拂子香合法衣孝子隨龕鳴樓鐘木魚鼓板送喪龕至山門首綵亭挂真有佛事奠茶湯有佛事兩班大衆門列俟龕出已山門維那面裏傘下合掌而立舉念往生呪或四聖號主喪領衆了了排行送喪左右分雪柳紫枝毋得挨肩交語各懷悲感喪司維那都寺押喪知客侍者俵行喪標頭位秉矩挂真喪至涅槃臺喪司維那俟都寺炷香了進前燒香請秉矩佛事佛事已念誦喪司知客平舉楞嚴呪回向式見後次鄉人舉經回向大衆須同念了首座領衆歸寺齊鄉人法眷孝子伴燒龕收骨齊了首集衆備從儀迎骨回𥨊堂挂真供養諷經二時上粥三時上茶湯或十日半月衆到諷經骨入塔則止之遜入塔至日備從儀集衆請起骨佛事送骨至塔所入塔有佛事諷經了迎真回𥨊堂挂真供養主喪燒香禮真次諸山兩班大衆孝子禮真畢孝子插香大展三拜謝主喪次兩班大衆謝主喪詞云山門不幸先堂頭和尚示寂仰荷主盟後事主喪云仰荷匡扶得逃曠敗主喪同喪司一行人巡寮致謝次孝子巡寮拜謝維那送見職守喪侍者歸房每日山門三時上茶湯集衆諷經牌位祖堂則止之或待新住持方入祖堂國全身入塔喪儀如前只分雪柳入塔念誦式見后呪塔諷經回向式具后迎真回𥨊堂供養有分衣衣鉢新舊價直高下點已估上單見數於法堂間敷設座位下外橫安長𤗋筆硯大磬鳴僧堂前鐘集衆主喪首座分手兩班垂手坐大衆次第分坐喪司維那知客面主喪位念誦式見后先開籠出衣鉢依號排席上請提衣佛事語絶維那即白云夫唱衣之法蓋稟常規高則不過七分八分低則不過一唱二唱且道不作貴不作賤有又作麼生商量提衣云一唱五伯若不請佛事即提衣云如來正法眼金襴僧伽梨展開也通變大千斂聚也絲毫不隔蓋千尺之軀不長覆丈六之身不短雖然藏在雞足山中爭奈今日猶在這裏示寂某人和尚化緣已畢撒手便行信手拈來對衆估唱提衣云一唱伍伯若法衣多總留遺囑次第呈衣維那接唱喪司合干人貴在公心主行維那眼親手辨定價打磬庫司目示上下唱定名字上單侍者依單發剽唱衣單結定鈔數主喪命單交鈔取衣不得順情退減主喪力主其事近時諸法不行唱法止是鬮拈先定衣價以天地等號於現前衆各分一鬮而鬮兩邊書號剪開各將一半捻之成圓歸于總柈各留照證又一人提起一衣呈示衆知却令一小行者於總柈內混亂其鬮信手拈一句與一人唱云天字幾號而現前衆將所留一半邊天機號之鬮付出合之喪司即依其名發剽鬮投水盆矣若三唱無人應者即將天幾號之鬮亦投於水盆而再拈一鬮矣乃次第拈去並無私情也若亡僧衣鉢豐厚不假衣錢津送竟將衣鉢分俵與現前僧衆如前鬮法庶無私情正符律制虞管待預在抄劄時作三分料定下遺書入祖堂管待喪司一應執事人嚫利均平息紛爭也次山門管待主喪一行人有嚫兩班耆舊光伴如常管待禮同陶孝服侍者小師麻布直裰兩班頭首苧布直裰主喪并法眷親密尊長生絹直裰次法眷師孫辨事鄉人諸山生絹腰帛檀越生絹頭巾腰帛方丈行者麻巾道服方丈僕從麻布服巾衆行者苧布頭巾甲幹火佃麻巾頭巾作頭麻布服巾唐兩班悼住持迹化皇唐福慧資於幽顯神迂內院悲哀動於林泉雖法應無有去來在輔粥合伸薦悼伏願眉間毫相舒剎剎之光明舌上風雷說塵塵之記莂吊上祭資次知事頭首主喪西堂耆舊諸寮舊侍者鄉人法眷莊頭庵塔小師師孫方丈方者六局行堂待詔方丈直斤方丈轎番老郎莊甲火佃修造諸色作頭有祭民念誦諸式宿夜回向奉為堂頭和尚入般涅槃茲裒大衆肅詣龕幃諷誦經文稱揚聖號所集功德回向示寂堂頭和尚增崇品位伏不忘願力再現曇花棹慈航於生死逝波接群迷於菩提彼岸再勞大衆念十方三世云云起龕金棺自舉繞拘尸之大城幢斾搖空赴茶毗之盛禮葬則云難提仰憑大衆稱念洪名用表攀違上資覺路念清淨法身十佛了便起行化壇堂頭和尚化緣已畢遽返真常靈棺遍繞於拘尸性火自焚於此日仰憑大衆資助覺靈南無西方極樂世界大慈大悲衆和阿彌陀佛十聲了云上來稱揚聖號恭贊化儀體格先宗機峻不容於佛祖用開後學悲心仍攝於人天收幻化之百骸入火光之三昧茶傾三奠香爇一爐奉送雲程和南聖衆全身入塔切以足示輪相紹靈鷲之遺規塔放戒光表芝園之垂化全機隱顯盛法始終仰憑大衆資助覺靈南無西方極樂世界如前十唱唯願惠鏡分輝慈雲廣布四生界內開示不生不滅之因六趣道中談說無我無人之法茶頎三奠云云如前法嗣切以恩逾鞠育義越遺金鬻心未就於鳳樓鼯鼠遽飛於鶴樹理畢竟於生滅孝當悼於莊嚴薄具薦修聊伸板慕伏願定力矗地摩雲之聳其祚增高法海滔天沃日之波其囦愈廣再勞大衆念十方三世云云小師粉骨碎身略未酬於攝受殞星徹電忽奄入於死門追趨庭之訓何懸念封樹之嚴愈遠仰瞻覺苑無任悲哀伏願悲心有感流智水以潤枯林窮子無歸朗慧日而開迷路再勞大衆念十方三世云云入塔諷經回向上來諷經功德加持寶塔有大功勛劫石可銷威稜益振祥光普燭幽暗頓明盡令况滯之徒俱登菩提之岸十方三世云云伐遺囑式某寺住持某年幾歲世緣報謝風燭不停所有隨身衣鉢檀信施利非常住物煩兩班抄劄端請某人主行喪事餘俵衆僧者經行喪毋致繁多侵用常住幸察此意伏希悉及年月日住山某人押大意若此不拘罪佛事資次入龕移龕禪規有鎖龕法堂挂真舉哀奠茶湯對靈䇿發山門首綵亭挂真奠茶奠湯秉炬安骨提衣起骨入塔入祖堂全身入塔撒土衣鉢豐每日奠茶湯一次周估唱衣單等式堂頭和尚歸寂謹具衣物估唱鈔貫收支見于后一天字一號一天字二號一天字三號右具如前公支外見管若干齊七追崇看經俵衆外餘無剩伏希衆悉今月日堂司庫子某甲具繳納度牒狀式某寺知事僧某甲右某甲本寺住持某宗師