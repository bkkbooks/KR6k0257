body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述地落髮儀欲出家者律中作單白和僧使大衆知和合者善不爾者循房房語令知作已應與剃髮先請和尚次請阿闍梨應具儀至和尚所三拜互跪合掌請之侍者先念夫頭云夫以儒敦事父唯重於成身釋制依師務存於學道故使四儀軌範藉此以琢磨五分法身因茲而成立理須竭誠事奉故當克志陳詞恐汝未能我今教汝請詞云大德一心念我某甲今請大德為落髮和尚願大德為我落髮和尚我依大德故得剃髮出家慈愍故三請和尚答云汝既陳請我當為汝作剃髮和尚次引至闍梨所禮拜互跪侍者云夫厭處凡流欣參寶位將欲剪除於俗態理宜警䇿於蒙心矧在當仁必由名匠今為汝請某人為落髮阿闍梨而況此師誨人無倦接物有方故須專秉一心恭陳三請詞云大德一心念我某甲今請大德為落髮阿闍梨願大德為我作落髮阿闍梨我依大德故得剃髮出家慈愍故三請闍梨答云汝既陳請我當為汝作落髮阿闍梨南山聖祖云應以諸部會明立出家儀式在於露地香水灑之周匝七尺四角懸幡中安一座擬出家者復設二勝座擬二師座欲出家者著本俗服拜辭父母尊者訖說偈云流轉三界中恩愛不能脫棄恩入無為真實報恩者乃脫俗服出清信士度人經善見云以香湯洗浴除白衣氣仍著出家衣今褊衫也來至和尚前互跪應為說髮毛爪齒皮何此故有人曾觀此五今為落髮即發先業便得悟道如羅睺羅落髮未竟便得羅漢如熟癕待刺蓮華待日為說法已而向阿闍梨前坐出善見論以湯灌頂讚云善哉大丈夫能了世無常捨俗趣泥洹希有難思議敬禮十方佛已行者說偈云歸依大世尊能度三有苦亦願諸衆生普入無為樂阿闍梨乃為剃髮旁人為誦出家唄云毀形守志節割愛無所親棄家弘聖道願度一切人出度人經與剃髮時當頂留三五周羅髮周羅者小髮也五三者趣舉耳來至和尚前互跪和尚問云今為汝去頂髮可否答云爾或有作文白之方與其落髮具如別袋準知落髮本是和尚恐其煩久故令闍梨為除餘者但留少許和尚親落今時先自剃作小髮非本教意除已和尚授與袈裟便頂戴受受已還與和尚如是三反和尚為著之出善見論說偈曰大哉解脫服無相福田衣披奉如戒行廣度諸衆生禮佛訖行繞三匝說自慶偈遇哉值佛者何人誰不喜福願與時會我今獲法利禮大衆及二師已在下座受六親拜賀出家離欲心懷遠大父母等皆為禮作悅其道意也中前剃髮出度人經毗尼母云剃髮著袈裟已然後授三歸五戒玄受具戒䇿發儀初淨人打鼓於法堂集沙彌兩人侍者到䇿發師安下處問訊一執手爐一鳴引磬䇿蒙師至法堂燒香升座畢沙彌行道燒香匝衆沙彌同禮三拜侍者教沙彌坐鳴槌一下梵音師作梵訖大衆同聲誦傳香偈如結界儀中偈了椎一下侍者念請師夫頭云夫刻雕完衆相皆憑良匠之功教育成全材須假明師之力若不虔請安能允從今為汝等一心恭請某人為䇿發阿闍梨而況此師誨人無倦接物有方故須專秉一心恭陳三請鳴尺一下高聲唱戒子隨念云大德一心念我某甲今大德為䇿發阿闍梨願大德為我作䇿發阿闍梨我依大德故得受具足戒慈愍故三請各尺一下侍者下座策發師答云汝既陳請我當為汝作䇿發阿闍梨所有教示汝須諦聽䇿發師說法如要語中說法竟尺一下起立云上來恭依律範行䇿發法事所萃洪因端為祝延皇帝聖躬萬歲云云如結界儀中下座作處世界梵訖而散黃受五戒儀一作梵二請師三請聖四啓白五䇿導六遮難七懺罪八秉法九說相十發願第一作梵初淨人打鼓於法堂集沙彌已兩人侍者到十師堂問訊一執手爐一鳴引磬迎五戒師前至法堂燒香登座沙彌行道燒香匝侍者鳴引衆沙彌同禮三拜侍者教沙彌坐鳴槌一下梵音師作梵訖大衆同聲念傳香偈云如結界中偈了槌一下侍者鳴尺一下念請師夫頭云第二請師夫元受三歸為翻往昔之邪境即授五戒先登初級之重樓不得明師難傳勝法今為汝等一心恭請某甲堂上某人和尚為五戒阿闍梨而況此師誨人無倦接物有方故須專秉一心恭陳三唱請尺一下高唱云大德一心念我某甲今請大德為五戒阿闍梨願大德為我作五戒阿闍梨我依大德故得受優婆塞戒慈愍故三請各尺一下女受云優婆夷五戒師答云汝既陳請我當為汝作五戒阿闍梨所有教示汝須諦聽侍者下座第三請聖戒師云凡欲傳授戒法先須迎請常住三寶護法諸天降臨道場證明加被三寶威重不可坐邀須當起立隨我言詞至誠處請尺一下齊聲和云我某甲稽首歸命一心恭請十方法界常住三寶清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛當來下生彌勒尊佛極樂世界無量壽佛十方三世一切諸佛大小兩乘毗尼戒藏一切法寶文殊師利菩薩普賢菩薩觀世音菩薩大勢至菩薩十方三世諸大菩薩南山聖師菩薩大智律師菩薩西天此土傳法祖師聲聞緣覺得道真僧惟願三寶聞今奉請同降道場證明受戒尺一下念南無十方常住佛法僧同各三聲各尺一下我某甲一心虔請護持正教列席諸天三界萬靈十方聖衆今年歲分賞罰神祇大元土境諸舊善神府城香火州縣聰明現前衆等本命星天此一住處護伽藍神惟願聞今奉請光降道場證明受戒尺一下南無護法諸天菩薩三聲各尺一下畢坐第四啓白上來恭請三寶必賜降臨願展祥光俯垂鑒念現前一衆今欲進受五戒為出家入道之基本切慮人根淺薄魔障忽生故先歸命佛天願求加被庶使現前一衆正當傳授之時一心不亂萬境條然能所相冥授受無昧仰冀威靈決彰感應念南無十方常住佛法僧各三聲南無護法諸天菩薩三聲各尺一下畢坐第五䇿導戒師說緣境發心如要語中第六遮難上來為汝說緣境發心已更須身器清淨若有遮難障戒不發我今問汝汝當實答先問重難一邊罪二污尼三賊住四外道五黃門六殺父七殺母八殺阿羅漢九破僧十佛血十一非人十二龍畜十三二形更問輕遮不問年歲衣鉢止十三遮耳問云汝今名誰五戒和尚名誰父母聽許不負人債非下使人名祿官人汝是丈夫丈夫五病第七懺罪上來問汝遮難既無更須罪根清淨方堪傳受隨我言詞行懺悔法我某甲至心懺悔往昔所造諸惡業云云如別紙三說各尺一下第八秉法罪根既淨戒體可發欲發此體必假三歸是故歸依理體三寶幸勿異緣尺一下戒子一拜隨聲念云我某甲歸依佛法僧以下並如羯磨經中三授各尺一下又三結尺一下云我某甲歸依佛竟法僧三結各尺一下第九說相善男子既已納戒今當示汝戒相受已依相奉持善男子盡形壽不殺生云云不盜不邪淫不妄語不飲酒第十發願行相既明大願主汝當至誠同聲發願我某甲至心發願云云如要語中尺一下回向云如結界創結中至波羅蜜下坐梵音師作處世界梵訖而散宇受十戒儀一作梵二請師三請聖四啓白五䇿導六遮難七秉法八說相九德數十回向第一作梵初淨人打鼓集沙彌已兩人侍者到十師堂問訊一執手爐一鳴引磬十戒和尚闍梨二師前至法堂齊燒香闍梨登高座和尚於座下坐已沙彌行道燒香匝侍者鳴引衆沙彌同禮三拜侍者教沙彌坐鳴槌一下梵音師作梵訖大衆同聲誦傳香偈如結界中偈了又推一下第二諸師侍者二人上首鳴尺一下念誦總夫頭云夫煉金鑄物而像生元因範正為人行已而有禮皆為師嚴若不令起殷重心安能感發增上戒必須用匝以決愚情今為汝等一心恭請某寺某人為十戒和尚某寺某人為十戒阿闍梨然此二師解行兼濟宗說俱通故須同秉一心各陳三請尺一下高聲唱戒子隨念云大德一心念我某甲今請大德為十戒和尚願大德為我作十戒和尚我依大德故得受沙彌戒慈愍故三請各尺一下和尚答云汝既陳請我當為汝作十戒和尚下首侍者尺一下云大德一心念我某甲今請大德為十戒阿闍梨願大德為我作十戒阿闍梨我依大德故得受沙彌戒慈愍故三請各尺一下闍梨答云汝既陳請我當為汝作十戒阿闍梨所有教示汝須諦聽侍者下座第三請聖闍梨云凡欲傳授戒法先須迎請常住三寶護法諸天臨降道場證明加被三寶威重不可坐邀須當起立隨我言詞至誠虔請尺一下沙彌齊聲和云我某甲稽首歸命一心虔請十方法界常住三寶請詞如五戒中第四啓白上來恭請三寶必賜降臨願展祥光俯垂鑒念現前一衆今欲進受沙彌十戒為出家入道之基本切慮人根淺薄魔障忽生故先歸命佛天願求加被庶使現前一衆正當傳授之時一心不亂萬境條然能所相冥授受無味仰冀威靈決彰威應念南無十方常住佛法僧護法諸天菩薩各三聲尺一下坐第五䇿導云云如要語中第六問難然此戒法必須身器清淨方堪進受切恐汝等身帶遮難以為戒障我今逐一問汝汝須如實而答第一問問善男子汝不犯邊罪否答無此十三難及下十三遮如羯磨經中二汙尼三賊住四外道五黃門六殺父七殺母八殺羅漢九破僧十佛血十一非人十二龍畜十三二形重難既無更問輕遮還須實答不問年歲衣鉢三遮但問十三遮耳善男子汝今名誰答某甲十戒和尚名誰答某甲闍梨為和尚父母聽負人債奴婢宦人丈夫五病上來問汝前無重難後無輕遮戒可得受第七秉法戒師說緣境發心如要語中了云當隨我言歸依三寶尺一下一拜隨聲念云我某甲歸依佛云云如羯磨經中三說各尺一下第八說相釋相之文如要語中一不殺二不偷盜三不淫四不妄語五不飲酒六不著香油塗身七不歌舞作倡伎樂八不得坐高廣大床九不得非時食十不得捉生像金銀錢寶此是沙彌十戒盡形壽不得犯何故止列十戒者為喜犯故然此十戒無作之體是為無漏解脫功德汝當護持無得毀犯第九五德十數如要語中五德者一發心出家懷佩道故二毀其形好應法服故三委棄身命遵崇道故四永割親愛無適莫故五志大乘為度人故此之五德出家大要也十數者一者一切衆生皆依仰食二者名色三者痛癢想四者四諦五者五陰六者六入七者七覺支八者八正道九者九衆生故十者十一切入已上十數一一對破外道要令汝等專心思擇辨別邪正故也此之十數各有名義廣在律文茲不繁引尺一下起立第十回向上來恭依律範行十戒法事所萃洪因端為祝延聖壽萬安回向等文如結界中下座維那作處世界梵訖而散是夜請壇師擘引標如上壇儀之中明之宙受具戒上壇儀加衣說淨附先於頭夜受十戒已十師并備員俱集十師當淨人鳴鼓集沙彌次侍者二人到堂問訊一執手爐一鳴引磬并挑燈迎諸師至法堂座下一行列坐諸沙彌行道燒香畢同禮三拜互跪次侍者分擘沙彌引標與十師了鳴引二下念夫頭云夫明鏡當臺遇形則鑑洪鐘在架有扣則鳴圓成三寶須假於三師撿舉七非全憑於七證而況諸師解行兼濟宗說俱通故須專秉一心各陳三請先請得戒師次羯磨師又次教授師後尊證師令諸沙彌各偏袒右肩右膝著地教如是請云大德一心念我某甲今請大德為得戒和尚願大德為我作得戒和尚我依大德故得受具足戒慈愍故三請大德一心念我某甲今請大德為羯磨教後尊證阿闍梨願大德為我作羯磨教授尊證阿闍梨我依大德故得受具足戒慈愍故各三請已十師應語發彼喜心齊聲答云可爾教授汝清淨莫放逸沙彌答云頂載持侍者復引十師歸十師堂至沉日空心就食堂中隨宜課佛了衆僧粥罷應先請一僧作加衣師次集沙彌持衣鉢就某處加衣侍者教沙彌禮三拜坐聽師說法加衣師說法云云如要語中訖令沙彌互跪執衣教如是言加五條正有三品割截揲葉褶葉也下有縵衣從有二十一品隨用改之大德一心念我某甲此安陀會五條衣受一長一短割截持三說加七條正有二品割截揲葉也下至縵衣從有二十二品隨改大德一心念我某甲此多羅僧七條衣受兩長一短割截衣持三說加大衣正有十八品割截揲葉各九也下至縵衣從有大品隨改大德一心念我某甲此僧伽梨若干條衣受若干長一短割截衣持三說加鉢梵語鉢多羅此云應器大德一心念我某甲此鉢多羅應量受常用故三說加坐具梵語尼師壇此翻隨坐衣大德一心念我某甲此尼師壇應量作今受持三說戒壇且作南向已上加衣法若無對首並許心念作之衣鉢加畢淨人鳴鼓侍者二人至堂仍前鳴引執爐挑燈迎引十師自堂而出舉南無本師釋迦牟尼佛行至壇所從東繞壇至西階上第二級投東朝壇一行立禮三拜壇長啓白祝聖畢收具復念本師號又東繞第二級壇至西階上壇上禮三拜次禮建壇四聖三拜並燒香念本師號從西向北入佛後出南依位立定侍者鳴引二下齊問訊俱坐壇下鳴槌一下有聲音者作梵訖衆誦傳香偈散花偈如結界儀中壇長鳴尺一下白壇今時多是不祝聖不禮拜不梵音不白壇徑直舉差壇長白壇云云如要語中訖次壇長拈沙彌引標著其名字端正念後差竭磨師教授師壇長云第一引沙彌某甲某甲某甲將升寶壇從僧求受具戒今請某寺和尚為羯磨師即第二位某寺和尚為教授師即第三位某寺和尚答所成法即第四位差了次羯磨作白差教授師應先問云有將此問在問和後問之誰能與彼沙彌作教授師教授師答云某甲能告云長老既能聽作法差問大德僧聽僧集不答僧已集問和合不答和合問僧今和合何所作為答受戒羯磨此是通答已後不須再和僧差別答云差別教授師出衆問難單白羯磨後法須和僧已上一節每日初上壇並依此式壇長不白檀直舉差也羯磨師云差教授師出衆問難單白羯磨大德僧聽云云如羯磨經中問成不了羯磨師云作法既成教授師出衆問難某教授師即從座起整衣持具從北入佛後向西出至佛前復朝東向僧問訊轉身從南面西階而下階下侍者鳴引引至教授所敷具而坐侍者鳴引教沙彌禮三拜了互跪侍者次第度衣鉢袱與師師與沙彌三人各擎之先安慰言善男子我受壇上衆僧作法差我下來問汝等遮難汝莫恐懼須臾持汝著高勝處汝等三人將升寶壇求受戒法然恐汝等身帶遮難障戒不發問難之前先當示汝衣鉢名義各有名體色量四種也教授師說示衣相遮難等備如要語中今略提云善男子汝袱中所有三衣一鉢名體色量乃恆沙諸佛之標幟賢聖沙門之軌儀比丘受戒之正緣為僧終身之道具祖師道若不已有定不得戒此衣此鉢是汝三人已有不答云已有衣鉢雖是已有要須身器清淨方堪進受若有遮難定不得戒我今問汝汝須實答遮難釋相如羯磨經疏中問邊罪污尼賊住外道黃門殺父母殺阿羅漢破僧出佛血非人龍畜二形更問輕遮汝各和尚名年滿衣鉢父母負人債下使人官人丈夫五病汝三人既前無重難後無輕遮可納戒法大略如此餘如要語中少刻壇上亦當如是答之汝等今於壇下立我往僧中作法和尚問衆僧衆僧默可我舉手召汝汝可即來其教授師令戒子起立為正著七條著履揲具衣鉢袱置手中語今於壇下立我當召汝教授師即從座起入壇南面東階上第二級面西行回身從西階上至壇上朝東向僧舒手相及處敷具正立合掌白云召沙彌入衆單白羯磨大德僧聽云云如上教授師只一拜收具問訊仍前西入復位坐之其第二引和尚即上第一引羯磨師也拈標差僧云彼第二引沙彌某甲某甲某甲將升寶壇從僧乞戒受具戒今請某寺闍梨為羯磨師只第一引教授師也某寺闍梨為教授師只第一引答法師也某寺闍梨答所成法只第一引第五師也下皆例此周而始第二引羯磨師差教授師單白詞語前後問答並同前其第二引教授師如前出衆從壇上東階而下侍者引去教授師其第一引教授師亦從座起於佛後出壇西階上立舉手喚前已教授沙彌云某甲某甲某甲來戒子上壇佛前一行立為接衣鉢袱次第安佛前小几案上為戒子燒香并四聖處香了令問訊禮三拜却引戒子從右邊北入繞佛後轉至和尚前為所衣鉢袱安羯磨師前小機案上令敷具禮三拜已皆互跪合掌告云汝當懇惻至誠仰憑清衆求哀乞戒恐汝未能我今教汝大德僧聽我某甲從和尚某甲求受具足戒我某甲今從僧乞受具足戒某甲為和尚願僧慈愍故拔濟我三乞了令戒子復座教授師歸位坐定次羯磨師對衆問難即白云對衆問難單白羯磨大德僧聽如羯磨經中問成否了羯磨師說衣鉢名義遮難等文如要語中若受戒人多不宜廣說羯磨師作單白已再問衣鉢有無及十三重難十六輕遮並同前教授師出衆問之一般然後說緣境發心備如要語中說了秉受具足戒白四羯磨如羯磨經中三番無差得戒圓滿作法既了令戒子三人朝外座待第二引教授師上壇作白召羯磨了又待教授師入衆生訖聽第三引羯磨師差教授師了方令戒子起三拜侍者在壇下鳴引引下壇往望壇處燒香問訊仍引至祖師堂燒香三拜了引入護壇侍者付小六念與之次說隨相及授四依法先說四波羅夷法次說四依法其文備如羯磨經中次請師作衣藥鉢展轉淨主是夜淨人打鼓集新僧於壇上侍者至說淨師所問訊鳴引引說淨師至壇上坐訖參頭燒香畢衆禮三拜令坐侍者鳴引一下念請師夫頭云夫因畜長財致使袈裟而離體能行說淨免教鐵葉以纏身不得明師安知深旨今為汝等一心恭請某人為衣藥鉢展轉淨施主而況此師誨人無倦接物有方故須專秉一心恭陳三請引一下衆請云大德一心念我某甲今請大德為衣藥鉢展轉淨施主願大德為我作衣藥鉢展轉淨施主慈愍故三請各引一下淨主答曰汝既陳請我當為汝作衣藥鉢展轉淨施主所有教示汝須諦聽淨施主說法如要語中說淨師說法了侍者一人先去請誦經師鳴引從壇東階而上說淨師從西階而下誦經師就座趺坐訖戒子參頭炷香一片同衆三拜皆坐次誦經師誦遺教經訖下壇而去衆戒子繞壇念楞嚴呪參頭回向此乃一壇受事辨若來日又受戒更如前行
