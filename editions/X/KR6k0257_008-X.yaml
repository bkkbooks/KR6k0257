body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述鹹住持毗尼戒藏佛法壽命諸祖傳持延洪教觀軌範三界拯拔四生明出世事轉大法輪解行兼濟名實相當如說而行師承有據開發上根提誘中上成就勝緣權衡縱奪致若行道說法之暇勾稽錢糓簿書豐儉隨宜供眾修造雖曰世間餘事古今亦號難濟苟能兼濟斯謂全才不及此者竭力運謀修造盡心供眾安僧列財住賢庶毋曠役斯謂三等住持良非細事焚修祈禱貴在專誠臨眾閑居無幔易叢林之設先病為先照拂矜怜猶須介念方來高士加禮送迎率身以先無事不辨如禪宗密菴尚且披衣夜臥代先師持戒克振家聲此乃千故典刑佛法重任也河前堂表卛叢林人天眼目分座說法開鑿後昆喫粥赴茶湯𮨇後瞻前訓兄弟行典刑中規合矩開講提誨悉有條章粥精粗分付執事亡僧後事撿察主行赴眾稍違傳語同室習讀有失委曲開示繩繩百世豈細事哉任斯職者可不嚴謹也耶淡後堂位居後板輔贊宗風講說軌儀晚生標格行叢林事訓責弟兄屬在前堂如闕前堂住持別日講後說及却轉前板會眾茶禮送歸前堂寮既揖前堂開講訓徒餘事一體或有律寺課佛誦經是首座舉唱宜詳緩合節可也鱗都監寺今都寺也山門重貴在得人幹辨公私責在都寺朝夕勤於香火歲計攷於簿書參辭官員賀謝檀越出納収支準備供眾齋粥常運勝心待物不可輕易行僕有犯量過行移罪無重科誠告听恕莊庫職務擇舉公心尊賢容眾和氣靄然供眾缺乏竭力運謀修造事務盡心成美同事才德推揚行止涉私密諭或有大過累及山門密䨱住持毋聞清眾方便處置萬不失一世二時撥忙赴堂他營語及大事公私纖粟分別種種愛護常住異日遇緣即眾人天模範盛大光明未可量也潛懺首鈔云結成罪種理須懺除則形清心淨應同僧法故薩婆多云無有一法疾於心者不可以暫惡便永棄之故須懺悔今欲定其綱位格其心境使是非鏡其耳目得失明其能所者何患妄業不除妄心無託矣須知事理二懺通道含俗罪相難明懺首之責其任非輕若也務在馳名所職何事也耶羽維那梵語維那唐言悅眾叢林典則一一舉行職列西班講通小部送往迎來禮須勤重病僧將息令得其宜兄弟麤心委曲調護挂搭歸堂撿示度牒僧堂上簾打扇閉戶糊牕當計寒暖亡僧衣物務要公明習讀拈鬮莫循私曲白佛舉經詳緩合節參假行事茶禮莫缺請益說文當勉來學或有他緣戒臈簿假簿當送過客司細大事務列諸條章凡眾僧關係之事一一提點使眾為懷可也翔知客官貴檀越尊宿諸山門子報及預當門迎次報方丈庫司知客即同引見接禮輕重臨時通變送安下已相引人事遊山披覽不得妄談鄙事接迎方來兄弟茶湯管顧如儀施主入山須預引接一宗祖又切須留意禮誦舉唱使有可觀言須涉典莫悞來學維那假出而叢林事一體行之或自有他緣須白維那侍者事同一也僧堂前撿點行益客人粥整齋遇亡僧同侍者把帳暫到死主其喪事夏間習讀茶湯之禮却與維那一同區處龍知浴凡遇開浴齋前挂牌寒月五日一浴暑月每日淋汗粥了發火鋪設浴室挂手巾出面盆整挹鞋鋪脚布參頭差行者直浴半晚浴頭䨱首座方丈維那鳴皷三下浴聖桶內皆著湯次第巡廊鳴板三下鳴開浴一通僧眾二通頭首三通知事行者四通人力監作彈壓浴次刊揭門首古來住持例在三皷入浴用屏風者遮行者也今來住持二皷前後入浴室禮小牌白字一湯二水三滿看有設浴施主課經回向盖玅觸宣明成佛子住前念是凡後念是聖則功不浪施矣師知殿嚴淨几案常滿灯油聖像時時拂塵供養隨宜修設施主香錢油錢無移互用責兩行僕勤奉香灯或遇風起須滅爐火結起幡脚勿近琉璃朔望節假開設殿門士庶往來隨心瞻仰抄覔油錢令生厭心返招惡果也火侍者燒香之職近侍左右听教朝昏期法道集大成舉賢能合輿論相看通覆委曲周旋尊宿諸山送迎合禮每事博問先知不致貼笑上下方丈如子侍父餘時不可預坐方丈行僕失事時時誡之住持事繁是事關抱維那知客他出回向舉喝事同一也亡僧輪把帳目諸山訪相在兩班後人事插香展拜官員到來拱听答對住持恐有失忘處當代言之白席因緣開講口議隨即呈錄祖文難處不住請益若慶喜之侍瞿曇其可忽諸書狀之職英機特立黼黻宗門官員書尺往還山門製疏作榜方丈命下具單稟呈乃輔贊住持也請客之職出類萃輔贊叢林官貴尊宿諸山相訪須當具禮欵延節臘茶湯特為管待先當具請狀書自己名燒香侍者他故回向舉唱把帳一同上位到門或住持未知首先迎接早晚咨參克成道業異日領袖叢林自茲發軔矣衣鉢之職諳歷叢林老成之士迺住厥責諸方通用晚輩德悞事非輕進納賢良忠諫過失應緣接物不可違時方丈一應禮節究心提點頭首寮舍缺典一一以時而照拂之兩序進退須預咨謀貴在得人庶符輿論直日之職乃是眾中年臈少者維那輪差多是未諳規矩維那及請益師須委曲教示使有可觀受戒布薩安居自恣鳴引儀法已亦於前出堂入戶須於住持前下手鳴引常離六尺恐踏師影故也僧堂二時打槌候堂前鐘鳴離位入堂左手上香一炷退兩步半問訊合掌而入槌邊立先看逐日回向神示鐘絕打槌一下合掌回向當日神明至念清淨法身處左手作盖勢側按槌墪右手打槌高不過五寸聲絕方下槌急緩合度行食時朝龕轉身退立板頭食遍進前打槌一下誦下畢合掌出堂至門限裏轉身面聖僧問訊合掌歸鉢位其餘軌儀皆當詳緩合節可也帝列項職員副寺之職職小任重眾人命脉所繫米麵當須細潔粥貴得精豐醬黃豆豉合辨及時鹽醋姜油滿足供眾缺乏預謀上首剋落常慎下流無徇私情勿圖己計推情保惜如護眼睛先德分司列任本為眾人今昧其源深加刻削麤飯薄粥臭醋淡韲任責者之無知實在住持之有過典座之職無真心供養者不宜徇情妄請當與前堂首座謀議從眾擢用萬不一失也當廣種菜蔬力除草穢四時合種雜物勤看老圃須知園丁當以私惠優其寒暑調和羮菜五味須全油醬姜料常住有限須出己囊及化施主以助堂供一人辨心諸天打供多見所在假名職圖監収却將園地半佔栽麻種苧以為園丁補洗遞代相承習以成弊厨中不許棄賤諸物執役選用苦行老成若設大齋品食須與上首知事商議過多減除皆不可也行者不律誨而至再不受訓者責之罰之同利均俵粥上桶焚香望僧堂設拜常把眾人頂在頭上自獲福利不汝欺也直歲之職日生事務無爽其時護惜山林以庇風水牧養火佃成褫常住掃洒廊廡疏決溝渠措辨柴薪巡警火盜灰記漏跡待晴整捉凡大修造各有司存勤苦向前以盡厥職古人一日不作一日不食思之莊主之職提督農務不可失時撿察田段牧養客佃頑暴者懲戒之貧病者優補之單丁者以時差役之旱澇災氛課誦禳保勿縱淫祀恣害物命諸佃重過具申山門暫到經過溫存食宿若塗田守莊者時時提點塘塍修補堅窂搜尋漏洞不住築塞春則積水早理秧苗秋防風潮黑夜尤急冬耕夏種無失其時不虞之具常備於莊其塘內有淡水閘無容潮水闇入忽遇天旱若發鹹氣則稻死矣毋尚刻剝竭力運謀使火佃有追思之心常住有羮餘之益方為善美矣街坊之職緣化施主添助常住隨彼施心毫𨤲無易緣事若多不可重扣初檀令生厭賤世尊乞食不越七家如阿難之歷街坊貧女寄破氈奉佛生難遭之想則可也水頭之職每朝燒湯眾人洗面手巾乾淨冬月焙烘常備灯燭牙藥更點未出鋪排面盆候洗面畢盆覆元處揭起手巾妨污染也盆留一二集舊巾一條以待後來者預積柴薪善緣為念炭頭之職暑月做造炭團辨積白炭或化施主或出庫司預當究心備準足用冬月齋舍均而送之以道為懷可也磨頭之職清眾喉襟麥用淘洗乾溫令均羅厨細蜜麵分頭次舂米潔白篩簸糠碎依時出來或歸庫司或俵同利務在公明為眾辨事外修持道業可也園頭之職勤苦卛先灌溉地段栽布蔬苗存撫園丁朝夕無怠収種下子及節依時火種刀耕以古為念可也樹頭之職山門松徑陰攁竹木護惜山林以備修造常切巡視栽補及時因果歷然功不浪施人少松枯再來良未晚也淨頭之職果自因生每朝掃地裝香及時剔燈點燭換籌洗廁出桶拖鞋手巾乾淨湯水寬容灰土常滿或時狼藉打併宜勤討柴洗籌俯恤人力觸邊明淨道業圓淨豈小補哉鳥百丈規繩按百丈大智禪師以禪宗自少室至曹溪而來多居律寺雖曰別院然於說法住持未合軌度別立規繩五條禪宗盛行然此五條雖則非律明制示應知其法云堂中及寮內失去衣物等須供衣物色數時節處所聞白主事驗認有無虗實如情重者白堂司集眾搜堂及寮犯者公行妄者棄眾聖眾內或有盜竊酒色及鬪諍污眾喧亂不律等事皆集眾棄逐出院不從即聞公或有假號竊形混于清眾并別致喧撓之事堂司撿舉抽下挂搭擯令出院以安眾也或有重犯玷辱僧倫并院門即須集眾以杖杖之焚燒道具逐出偏門者示耻辱也堂內清眾如不充主首掌握山門但隨眾齋粥參請外當各自省己守分積德隆道用光嚴席不可己外于管院務擅自更張生事走扇是非有撓清眾無令安靜違者即遵院令南山聖師有云一方行化立法須通處眾斷量必憑律教若法出恒情言無所據科罰同於鄙俗教網唯事重麤能施已是於非所被固多喧亂如是能令眾法速滅不值佛世生地獄如箭射如今叢林若有知法者須行律中七九治罰方符佛制謂訶責擯出依止遮不至白衣家并不見舉不懺舉惡見不捨舉及惡馬治默擯共九法也須者尋之出僧綱篇官日用清規夫律乃戒也禪乃定也非戒則不生定非律制則不成禪規其實皆一也無量壽禪師宋嘉定間分座信之龜峰而筆日用清規多符律範余令取其相同者以備日用庶完吾宗行事中間或有新學得箇入處而三千威儀八萬細行自然而然矣兄弟初來須知入眾之法睡不在人前起不在人後五更鐘未鳴輕身先起莫驚同房抖搜精神端坐於床思其日所誦文或製作未完或看讀未到祖師云靜處思微道之正軌次第轉身下床取手巾搭左手想念偈云朝從寅旦直至暮一切眾生令回護若於足下悞傷形願汝即時生淨土唵逸帝律儀娑婆訶輕輕開門去後架不得拖鞋咳嗽作聲輕手取盆洗面湯不宜多嗽口須仾頭吐水以手引下直腰吐水恐濺隣桷不得洗頭有四件自他不利一污桶二膩巾三枯髮四損眼不得鼻內作聲不得噴水撲面不得高嘔吐不得涕唾污桶古云五更沸面本為修行嘔吐拖盆喧堂聒眾燒香禮拜須披袈裟先合掌頂戴念云善哉解脫服無相福田衣我今頂戴受世世常得披唵悉陀那娑婆訶摺袈裟須齊整置衣架上問訊而去若先去殿堂禮拜不得佔中央尊住持也不得出聲念佛不得行於禮人頭邊過次第板鳴眾人歸殿禮懺須各至誠懺畢過當歸鉢位左肩順轉上床不得背人入堂門時從南頰入不得中央及北頰入尊住持也歸鉢位低躬問訊上中下座若己先坐而上中下座來亦須合掌古云不敬上中下座婆羅門聚會無殊登牀偈云登此天得解脫床平等智慧清淨光聞長板鳴下鉢擡身起須正立然後轉身亦從左肩合掌念偈云執持應器當傾眾生成就法器受人天供取鉢以左手托鉢右手解鈎轉身令正蹲身放鉢免將腰背撞人不得頓身坐不得麤暴上床不得以手左右搖曳取鉢安面前聞槌聲合掌想念云佛生迦毗羅成道摩竭陀說法波羅柰入滅俱絺羅展鉢之法先合掌想偈云如來應量器我今得敷展願共諸眾生等三輪空寂然後解袱展淨巾覆膝上其袱摺轉三角莫令垂下次展鉢單仰手取鉢安卓上以兩手頭指併定取壎子從小次第展開不得敲磕作聲護第四五為觸指摺鉢拭橫身前匙筯放上橫袋放鉢拭下出則先匙入則先筯把處為淨頭不可向上肩鉢刷安第三壎縫中出半寸許以盛生飯匙筯頭不可出生不過七粒太少為慳食頭首舉唱大眾念佛合掌不得參差須高低當胸得中不得以手托口邊古云參差合掌不當胸十指交加插鼻中拖履指簾無細行嘔聲泄氣逞英雄兩手捧鉢受食想念偈云若受食時當願眾生禪悅為食法喜充滿若見滿鉢念偈云若見滿鉢當願眾生具足飽滿一切善根若食與多起手止之念偈云此食色香味云云如后聞遍食槌看上下肩以面相朝揖食不得正面以手搖兩邊也作五觀法小食食時偈及出生偈並如后喫食之法不得將口就食不得將食就口盛食不許呼索取鉢放鉢拈匙放筯不得有聲不得咳嗽不得畜鼻涕若發噴嚏當以衣袖揜之不得抓頭恐風屑落隣鉢中不得挑牙不得嚼啜羮作聲不得挑鉢中央食不得大摶食不得張口待食不得遺落食不得手把散食如有菜滓可安屏處若使扇莫扇隣肩若自己怕風白維那堂外坐不得手肘枕膝上隨量受食不得請折律云量腹而食也頭鉢不許盛濕食不得將羮汁頭鉢內淘食不得挑菜頭鉢內和食食時須看上下肩不得太緩不得太速未再請不得先刷鉢不得吮鉢刷作聲食未至不得生嗔逼討古云獃獃四顧起貪嗔念食吞津咳嗽頻摝粥啜羮包滿口開單展鉢響諸隣洗鉢之法頭鉢盛水不許在內洗匙筯次第洗壎子不得灌漱不得吐水鉢中不得先盛熟水洗鉢未折水不得先収盖膝巾不得將膝中拭汗不得瀝水地上折水偈云我此洗鉢水如天甘露味施汝諸鬼神悉令得飽滿唵摩休羅細娑婆訶収鉢以指按定次第而入袱了合掌念飯食已訖偈如后其飯食已訖色力充偈乃教家所誦食畢不許先起鳴槌了住持下地次第挂鉢不得脚踏床緣下地出堂上殿諷誦了各歸房課經禮佛或誦文者至請益師處上文或看讀或覆述各自著鞭不得輕負大眾若赴茶湯不得垂衣坐不得聚頭語笑不得雙手揖人若看經不得長展經紙不得垂下經帶不得把經行誦不得高聲不得背靠板頭古云出聲持誦吵噪稠人背靠板頭輕欺大眾若後架時律制比丘須披五條令以手巾搭左手或無巾解絛繫笐上摺衣與裰令整齊絆定仍各懸尺許以為記認不得在外催逼不可共人語笑右手提水入廁換鞋不得參差安淨桶當前鳴指三下驚噉糞鬼蹲身須正不得努氣作聲不可隔壁共人語古云戶扄須合輕彈指人擁那堪亂作聲入處用籌分觸淨出時須水忌縱橫不得以水澆兩邊洗淨護大指二指不得多用籌子古云浴湯少使籌子休拈乾手將內衣入袴口出門左手提桶換鞋濕手不得拏門扇并門頰淨桶仍安舊處右手挑灰後挑土濕手不可拏灰土不得吐𣺡和泥洗手須用皂角洗至肘前出廁入廁須逐一念真言入廁唵恨魯陀耶娑訶洗淨唵賀曩蜜律帝娑訶淨手唵主迦囉耶娑訶淨身唵室利曳娑醯娑訶去穢唵枳羅腦迦吒娑訶若小遺亦用水洗手若著草履遊山不許經行佛殿古云衩祖登溷草履遊山莫踐法堂回互耆舊廊行須讓耆宿徐步下肩赤肩脚不許著僧鞋不得把手行談世諦是非古云別了雙親棄本師訪尋知識擬何為不曾說著宗門事白首無成過在誰不得殿前倚靠欄干不得猖狂急走古云行須緩步習馬勝之威儀語要低聲學波離之軌範殿塔內不許閑行古云無事不須登佛殿等閑休向搭中行不因換水添香火縱有河沙福也傾齋了洗衣不許衩祖不得傾用湯瓶竹竿使了仍歸元處新來兄弟規矩生踈善言誘諭勿起嫌心不得衩祖廊下行不得手弄數珠而同戲物放參後不許出山門不得入小寮如開浴以右手携浴具律制須披五條下門入浴門內問訊目視空處歸位須揖上下肩笐上先搭中次搭五條展浴袱取浴具放一邊解上衣脫下裳以脚布圍身繫浴裙却將裩袴摺袱內次挂直裰與五條一處繫淨衣裳入袱包內拖鞋入浴古云三通浴皷入堂時觸淨須分上下衣笑語高聲皆不可莫將麤行破威儀不可亦脚入浴室須下間空處待次而浴上間讓頭首耆宿也勿令湯水濺人及己拭浴人身上不得桶內泡脚及洗僻處不得將脚閣桶上不得槽上揩脚不得室內小遺不得語笑不得𡰷水不得掇桶澆身須當遮護渾身不得露醜脚布不可離身若有脚病不可入桶或洗灸瘡或用疥藥並宜在後入浴不可多用湯水不得將公界手巾拭面出浴須揖上下肩而坐次第著上衣先以直裰遮盖其身方著下裳解去裙衫而脚布安裙衫內免濕袱角不得將濕脚布搭手上仍揖左右出堂若有設浴施主隨意課經回向黃昏鐘鳴合掌念偈云聞鐘聲煩惱輕菩提長智慧生離地獄出火坑願成佛度眾生尋常出處直裰宜露袴口袴裏不宜著小袖夜睡披五條眠右脇為尊左肩衣也仰為屍臥覆為婬睡故多惡夢辨道兄弟行住坐臥不越規矩晝三夜三正好用工禮儀疎怠有動眾念赴眾法律各有條章舉措看他上流慎勿隨於庸鄙叢林所貴在乎整肅一日何止三省吾身今編日用則乃舉其大略耳若欲免其頭頭敗缺直須一一遵行然後敢言依教建修破惑顯理超越生死得至涅槃上求佛道下化群萠也耶人十威儀頌十威儀頌乃禪宗笑翁和尚力行古道而作也中有洗面展鉢登廁入浴四偈全用其言餘之六章脫胎換骨述以足之云爾日亦然兮夜亦然睡時宜後起宜先殿堂禮誦候開靜動止回施向左肩一晨朝洗面莫猖狂盥漱低頭少使湯頭若痒時須待浴手巾乾淨不相妨二寫字吟詩遣睡魔不須將此當嘍囉南山教觀多玄旨好把工夫去琢磨三寂靜身心展鉢時出宜先筯入先匙食巾収摺須臨後左右和南禮莫虧四粥了和南齋了茶說文習讀莫喧譁出堂入戶清規合要見叢林有作家五說恣差僧行事時從規自合具威儀近來一輩無羞恥直裰中間小袖兒六誦文鬮出不尋常莫教無聲靜法堂賞物雖無猶自可僧前罰拜最難當七脫著衣衫貴整齊掩門須緩放籌仾密持呪語輕彈指淨讀常將右手提八入浴披衫貴靖恭需湯擊板合從容不應脚布安槽上双脚如何著桶中九負笈尋師號學人業精名遂在乎勤秋堂雨後凉生夜誰解明燈照祖父十
