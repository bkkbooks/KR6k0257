body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述遮相看名勝相看方丈當粥罷參前預到侍司侍者接入分坐献茶湯略敘來歷而起爐前謝茶即稟云某等時來禮拜和尚輙煩高侍通覆者云少坐詳詢來歷曾與方丈道舊或法眷鄉人辨事者欵坐少時容某通報即覆住持或官客或迫冗稍緩即須相接侍者令裝香秉燭辨茶報新到住持出𥨊堂侍者引接住持進爐前新到云請和尚趺坐免則插香展具又免則通寒溫云云入座坐侍者燒香點茶敘話起爐前謝茶即送客位還香回禮盖全賓主之禮也亦須展具俾𮞏相恭敬規示後學即到侍司到謝云適煩神用特此拜謝者云適間禮合何厪降重即回安下客頭請半齋點心參前持為湯湯罷藥石來辰粥了請献茶別日置管待古法受香禮管待不可違近來諸方辨事兄弟經行遊覽隨處歇泊住持亦當俯臨報盡主禮也邇西堂首座挂搭大方西堂名德首座欲作住計語次露意住持當勉留次日請茶了稟云某教觀未明特來依棲和尚伏望慈悲收錄住持答云如蒙不棄得獲同守別日或即會兩班茶住持躬起燒香一炷即復元位立白云某處西堂首座不棄來此同守寂寥煩兩班相送歸房受送人即進前云某甲特來依捿重荷甄錄住持兩班送歸齋舍住持居主位詞云即日恭惟堂頭和尚起居多福宿生慶幸仰荷收錄住持詞云山門多幸同守寂寥送住持出受送人居主揖侍者入作賀送出揖兩班入作賀送出即懷香詣方丈謝床位堂司庫子引詣庫司諸頭首耆舊寮人事且望茶並同孝舊例壹諸方名勝挂搭相看人事欲求挂搭赴茶罷稟云某寺心第久塞理觀未明特來依附和尚伏望收錄住持云特荷不棄同收寂寥即請首座都寺維那喫茶住持躬起燒香一炷敘白送意如前受送人進云某等重蒙和尚收錄即當隨眾以听警策答云山門禮當延送即送歸齋舍住持居主講禮送出門接侍者作賀送出兩班人事了受送人即懷香詣方丈謝床位堂司行者引至庫司諸寮舍人事而已體法眷辨事挂搭到不抱時先訪侍者詳說來歷令覆住持相看插香行禮若弟姪已下法眷辨事曾執侍者皆當受禮揖香献茶送客位回禮或送齋舍禮興前同卛新來挂搭律院少有且過新來兄弟首到客司推熟叢林者為參頭領眾具威儀列門右白云暫到相看知客即接入詞云即日恭惟知賓尊長律師尊侯起居多福久欽道譽獲奉瞻仰下情不勝感激之至答云山門多幸特荷遠來揖坐燒香喫茶詢來歷即起謝茶如無安下處即就客司圍爐等處安歇知客就送回禮參頭接入普問訊知客云移刻恭惟諸位鄉長律師尊候起居多福適承降重特此拜謝下情不勝感激之至答云禮合拜看何勤降重參頭自送出門次詣侍司相看行禮如前立稟云某等特來禮拜和尚敢煩侍者通覆侍者詢來歷覆住持如允報相看或即時或粥了𥨊堂相接參頭進前請趺坐轉身在手插香退身同眾行禮三拜就座侍者燒香喫茶謝茶與前相看禮仝詞少異住持送出參頭云和尚尊重隨至侍司致謝云有勞神用特此拜謝歸安下處門外下手排立候住持回禮同問訊接入詞云移刻恭惟堂頭和尚尊候起居多福適來禮拜不專返辱降重下情不勝感激之至住持云安下不便幸望寬懷眾送出參頭轉上手揖侍者入同眾問訊云移刻恭惟高侍律師起居多福禮合詣寮拜看返辱降重下情多感者云山門多幸特荷遠臨報謝在遲不勝多愧半齋點心當晚特為湯了就座藥石行者燒藥石香一炷或頭首光伴食了住持送出次日粥了請茶喫茶謝茶等禮並如常茶罷新來詣侍司屈侍者稟住持言新來欲歸堂之意如允許了侍者發榜頭下堂司隨即請茶維那接人燒香喫茶了稟云某等蒙和尚令依左右伏望甄錄答云山門多幸同聚寂寥取度牒付維那上戒臘簿了維那付度牒還參頭各收訖維那同到新來安下處問訊客云茲來多幸重辱溫存下情不勝感激之至答云房舍不便幸乞寬處參頭送維那出問訊而散次堂司行者寫榜頭卛香錢付侍者回香侍者回大香或一片或各片與行者付參頭次稟挂搭日子名書門狀次日𥨊堂嚴設香几爐燭參頭領眾列立三人一引每引一人為小參頭詳記詞語進退儀即預須一處習儀庶臨時成現至時侍者同參頭入請住持出廟位立參頭歸位眾同問訊後進前云請和尚趺坐從爐裡轉復位同眾問訊再同進爐前於各懷取香左手插香復位本引三人一同問訊展具三拜了參頭進前云即日云云某等宿生慶幸獲奉依棲下情不勝榮幸之至一齊問訊過右邊直待班尾三三趲上禮語仝前俟各行禮畢普同問訊而退次到侍司首座庫司諸寮巡廊人事畢歸齊候回禮榜頭式奉方丈慈旨挂搭二僧某甲侍者某甲律師今月巳日侍司某甲報卛香小榜挂搭首座名率錢百文買香堂司行者某甲取覆方丈門狀式某路某州某寺小比丘某甲右某甲謹詣函丈候禮拜某寺堂上和尚大宗主伏候慈旨年月日某路某寺某小比丘某甲狀賓方丈回禮至日挂搭了方丈回禮新挂搭人參頭領眾就一處房外下手排立候接住持入齋問訊云移刻恭惟堂頭和尚尊候起居多福理合禮拜反沐降重下情不勝感激之至眾送住持出隨入齋轉上手立參頭接侍者入詞云某等獲依左右茲沐降重下情不勝感激之至答云拜謝不專下情不勝感激之至參頭送出接兩班入詞語同前畢眾挂搭人轉下手副參為首謝參頭問訊而散歸謝挂搭茶侍者照戒臘具挂搭者雙字名某甲律師令方丈客頭詣各訪請云今辰齋退方丈和尚請就𥨊堂特為點茶如西堂首座亦依戒次寫入次令客頭排立請首座光伴如名德西堂首座與住持對面位參頭次須當相遜無至喧聒失禮齋了鳴皷集眾燒香侍者揖入住持接敘寒暄次接光伴人問訊詞語尋常茶同各依照牌入位照牌預稟住持看定二侍者行禮與結制小座湯禮同禪規寫茶狀各僉名依命若例禪規次日庫司點挂搭茶於庫司設位首座光伴齊了鳴庫堂前板上首知事與同班行禮同前又次日堂司點挂搭茶上首知事光伴鳴寮前板一班行禮或四人六人列位頭問訊若知客行禮揖香了座同茶三日講行此古法也方丈茶鳴皷知事頭首茶鳴板互為主伴方丈茶眾起謝知事頭首茶只參頭離位謝此禮亦當行之王參堂新挂搭欲參堂先一日晚詣堂司屈維那至方丈稟請住持云新挂搭兄弟來早欲參堂伏望和尚慈悲尊降請訖歸堂兄弟在來日早粥皆於外堂展鉢少少盛粥留於禪床預推一人為參頭侯內堂粥徧行者出堂參頭領眾前門入堂先舉左足聖僧前排立參頭燒香歸位同眾大展三拜收具問訊參頭先至住持前列一行立普同問訊低首合掌巡堂一匝自上堂至下堂出外堂先下間次上間再入堂內中間列立問訊出堂歸鉢位喫而已迁齋狀式講下小比丘某甲右某甲今欲迁某齋在下脫著未敢自便謹狀上呈本講依止和尚大宗主伏乞慈判付某照證謹狀年月日講下小比丘某甲狀堂司比丘某甲備用方丈題初三日押方丈押如來有齋名却云欲迁齋舍在下脫著未蒙慈旨鳴請益禮師投情請益先詣侍司詳稟侍者咨覆住持云某甲律師來早欲詣方丈請益如允所請早粥了詣侍司俟候某侍者隨住持坐處令秉燭裝香引入問訊插香一片大展九拜收具進前問訊云某甲心第久塞義路未開伏望和尚慈悲方便提示肅躬側立下手諦听法誨埀問來歷從實稟答了進前問訊而退次詣侍司致謝或就廊下頭首西堂請益行禮一仝鳳開講開講訓徒以成叢林當然之事講者訓誨無倦听者專心至志何患事業不成耶遇開講日堂司行者於僧堂早粥再講了覆住持開講云今日和尚打講却於下堂鐘絕後略歇打靜鐘三下首座開講在齋後打靜鐘同上繼於法堂東西柱挂開講牌維那合堂司行者整齋講筵至半齋前覆方丈打起如方丈有他緣打放講鐘二下或迎送或普講或送亡則放講如開講先巡廊打小板次打僧堂前鐘眾集法堂燒香爐前隨意設拜不拘次第堂鐘絕打法皷先擂三通上磉轉通之時直日人鳴引二下維那舉七佛略教經至應當學再鳴引二下直日起賷坐具至東西廊法堂頭候開講人來鳴引二下問訊眾人聞引鳴皆提具起立疎疎鳴引至法堂爐前西首立講人燒香三拜未拜前直日鳴引二下歸位講人揖眾眾皆應揖拜起收具問訊從東西首升座座上燒香鳴引二下講人與眾齊揖放具而坐講人鳴尺三下舉稽首禮諸佛云云至莊嚴種智乞聖冥加畢開講人舉南無本師釋迦牟尼佛南山大智各三聲各尺一下開卷講說延促隨意講了掩卷講人鳴尺一下云上來說听功德祝献護法諸天報答四恩三有伽藍真宰護教安僧法界眾生同圓種智十方三世云云佛菩薩號中名尺一下眾起立講人下座至爐前直日鳴引二下講人與眾不同問訊而散住持行東道首座行西道在參講住持開講座下未聞者理當參之或諸山來亦行參禮若首座講住持亦參之重法故也凡外來參講者待鐘鳴至法堂座邊不次而坐待眾念大智律師號時起身至爐前立定參頭燒香退步同問訊展具三拜若四人以上則不應同拜盖眾不禮別也若言師禮拜則不拘若論謙光俱不受拜如參講人位尊先於座下西首設位開講人當起立令侍者傳語免禮請坐講人於掩卷後作詞敘謝或四六或散文隨意言之講人下座至爐前略謝參講次詣下處賷香致謝其茶湯藥石煎點之禮如前已明樹晨朝禮每晨寺眾長版纔鳴出諸殿堂燒香至殿內隨意禮拜如人至多則不可拜住持待木魚響出諸殿堂燒香頭首當在殿外同住持燒香將徧頭首入殿淨人打過堂板住持上殿鳴大磬三下維那舉經住持燒香遶殿而轉歸中間蒲團位堂司行者預將舉禮牌置於當做禮人前經畢舉禮人念一切恭敬云云如晨朝禮儀中三歸依了收具住持舉彌陀讚念佛百聲菩薩各三聲餘如常法至十方三世云云了維那舉消災呪住持領眾赴堂白施主南無十方佛法僧三稱了念神呪加持淨飲食普施河沙眾鬼神願皆飽滿捨慳心即脫幽冥生善道歸依三寶學菩提究竟得成無上覺功德無邊盡未來一切眾生同法食呪曩謨薩縛怛多孽跢縛路枳帝唵三跋羅三跋羅吽念七遍以淨水洒食次念甘露水真言南無素嚕皤耶怛他揭多耶怛你佗唵素嚕素嚕鉢囉素嚕鉢囉素嚕莎訶三遍次念四如來號南無多寶如來南無妙色身如來南無廣愽身如來南無離怖畏如來三稱次念受食願文此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿令諸施主得無量波羅蜜次出生偈汝等鬼神眾我今施汝供此食遍十方一切鬼神共願以此功德云云至十方三世云云駒普回向諷經持呪功德祝献護法諸天報答四恩三有伽藍真宰護教安僧法界眾生同圓種智十方三世云云眾回向以此諷經念佛功德祝献護法諸天報答四恩三有利樂法界眾生我等比丘懺悔罪根莊嚴淨土願此身報盡臨捨壽時承此善根決定得生極樂世界見佛聞法速證菩提廣度群生大作佛事食四節土地堂回向結解冬歲宜於土地堂嚴設供養諷經回向云結夏切以薰風扇野炎帝司力當法王禁足之辰是釋子護生之日乞所加護以遂安居恭裒大眾詣靈祠持誦消災威德呪經萬行楞嚴秘章稱念摩訶佛母聖號集茲功德化煉馬財專伸奉貢當地山土地列位合堂真宰所冀神光叶贊發輝有利之勛律苑起隆永錫無私之度十方三世云云解夏切以金風扇野白帝司方當覺皇解制之辰是法歲周圓之日九旬無難一眾咸安是用秘章以酬洪德至節切呂時臨亞歲節屆書雲當一陽來復之辰乃萬彚發生之始除夕切以化功密運歲歷云周咸忻四序之安將啟三湯之慶場楞嚴普回向乃禪宗真歇和尚自製古法放參後打起眾集大殿諷誦偈云上來現前比丘眾諷誦楞嚴秘密呪回向護法眾龍天土地伽藍諸聖造三塗八難俱離苦四恩三有盡霑恩國界安寧兵革消風調雨順民康樂一眾熏修希精進十地頓超無難事山門鎮靜絕非虞檀信歸依增福慧又回向云妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身仰冀洪慈俯垂昭鑑敘情𢌞向神位了云先願皇風永扇帝道遐昌佛日增輝法輪常轉次冀山門鎮靜中外咸安火盜公私諸緣吉慶現前僧眾修行有序進道無魔般若智以現前菩提心而不退四恩普報三有齊資法界有情同圓種智十方三世云云已上𢌞向乃禪宗楞嚴會行之人誦者多故附於此化日用偈章凡曰出家心形異俗鷄鳴而起謀利圖名顯行既無密功奚有然而十二時中所為之事佛經俱有遺誡可不依而行之謹錄于后睡時若就睡時當願眾生一切安穩得大自在起時睡眠始寤當願眾生一切智覺周顧十方登溷大小便利當願眾生棄貪嗔癡蠲除罪垢洗手事訖就水當願眾生出世法中速疾而往洗面以水洗面當願眾生得淨法門永無垢染登殿若見佛時當願眾生得無礙眼見十方佛登閣上昇樓閣當願眾生昇正法樓徹見一切瞻塔見佛塔時當願眾生尊重如塔受人天供禮塔頂禮於塔當願眾生一切天人無能見頂濯足若濯足時當願眾生具足神力諸行無礙洗浴洗浴身體當願眾生身心無垢內外光潔受食若受食時當願眾生具足成滿一切菩提食齋粥若小飯食時當願眾生禪悅為食法喜充滿食訖小飯食已訖當願眾生所作皆辨具諸佛法受味若受味時當願眾生得佛上味甘露滿足施粥粥有十利饒益行人果報無邊究竟常樂又偈持戒清淨人所奉恭敬隨時以粥施十利饒益於行者色力壽樂詞清辨宿食風除餓渴消是名為藥佛所說欲得人天長壽樂應當以粥施眾僧施齋三德六味施佛及僧法界有情普同供養三德者一輕輭二淨潔三如法六味者一甘二苦三辛四酸五鹹六淡又食訖偈飯食已訖色力充威振十方三世雄回因轉果不在念一切眾生獲神通五觀一計功多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道業故應受此食禮佛能禮所禮性空寂感應道交難思議我此道場如帝珠諸佛菩薩影現中我身影現諸佛菩薩前頭面接足歸命禮禮釋迦讚容顏甚奇妙光明照十方我昔曾供養今復還親覲聖主天中王迦陵頻伽聲哀愍眾生者我等今敬禮贊嘆讚彌陀阿彌陀佛真金色相好端嚴無等倫白毫宛轉五須彌紺目澄清四大海光中化佛無數億化菩薩眾億無邊四十八願度眾生九品咸令登彼岸又偈稽首阿彌陀救世大慈父甚深真法藏三乘賢聖僧我以誠實心求生佛淨土願諸本弘誓普運無緣慈應念赴機緣猶如水中月又彌陀讚大智律師作八萬四千之妙相得非本性彌陀十方億剎之遐方的是唯心淨土淨穢雖隔豈越自心生佛乃殊寧乖己性心體虗曠不礙往來性本包容何妨取捨是以舉念即登於寶界还歸地產之家鄉彈指仰對於慈容實會天真之父子幾生負德枉受沈淪今日投誠必蒙拯濟三心圓發一志西馳盡來際以依承歷塵劫而稱贊讚菩薩偈菩薩清涼月游於畢竟空眾生心水淨菩提影現中讚觀音紫金化身千百億白衣妙相三十二稽首圓通自在尊沙界咸稱大悲智開經偈無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義還經偈琅凾歸寶所了義實難思願共諸眾生同入薩波海訖經三塗永息長時苦六趣休隨汩沒因無邊含識悟真如一切有情登彼岸三歸依我某甲從於今身直至佛身於其中間歸依十方常住佛法僧化教六念念佛救世大慈父念法出離解脫門念僧諸有良福田念戒無上菩提本念施具足波羅蜜念天護法離群生四弘願眾生無邊誓願度煩惱無數誓願斷法門無量誓願學佛道無上誓願成懺悔偈我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔往生偈願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎又偈我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切眾生界彼佛眾會咸清淨我時於勝蓮華生親觀如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切眾生界乃至虗空世界盡眾生及業煩惱盡如是一切無盡時我願究竟恒無盡普曜經偈是日已過命則隨減如少水魚斯亦何樂當勤精進如救頭然但念無常慎莫放逸板歲旦元宵正旦元宵各寺祈禱規式不同或修光明觀音等懺或誦經文或秖課呪無非懺洗已往之過祈集將來之福也隨方毗尼難為定式草青苗祈禱萬年常住全藉田租秋糓不熟何以安僧理當精加祈禱以求陰助各處規式不一或只就寺營供佛天看經諷呪或到莊所遶田行道並宜隨方上年已行不可越例為住持知事者可不究心也耶伏願五樂欲茂須求雨澤應時萬法告成全藉神明陰佑謹仍舊貫預設良緣就寺集僧遶田行道諷誦經呪化煉馬財奉献云云專冀畝畝豐登田田秀實螟螣蟊賊永無耗損之憂黍稷稻粱大有盈餘之慶木秉白梵音聲圖賴行堂諸儀行堂點茶結解節臈眾僧茶罷方丈侍者同客頭至行堂點茶客頭預報參頭挂牌報眾燒湯出盞請典座光伴方丈預送茶侍者至庫司典座接入參頭堂主領眾門迎侍者居主位代住持也典座右位侍者出爐前燒香一炷復位以手揖眾坐行茶畢典座送出參頭堂主門送即詣方丈謝茶方丈點茶罷知事詣行堂點茶知事居主位典座光伴與方丈茶禮仝送出門喝云參頭大眾詣庫司謝茶報云知事傳悟免謝茶頭首點行堂茶令堂司行者報參頭挂牌報眾燒湯出盞請典座光伴頭首居右為禮與前同喝謝茶復喝免訓童行初一月半當訓童行若禪規五參上堂罷當訓童行參頭行者令歇食行者報各局務行者行堂前挂牌報眾昏鐘鳴行堂前鳴板三下集眾行者上寢堂立定參頭入方丈請住持出就座參頭進前插香歇參同問訊九拜進前屏息拱听規誨已又同眾三拜珍重而退預令寢堂裝香秉燭係侍者提調行堂普說參頭預詣侍司插香禮拜稟侍者咨覆住持若允所請參頭即鳴板集眾排立寢堂參頭隨侍者入請住持出據座參頭同眾問訊進前插香歇食行者喝云不審同眾禮九拜問訊參頭進云某等久思和尚示誨伏望慈悲開示因緣退身問訊而散次日行堂挂普說牌報眾面裏設座香机燭臺參頭報請兩班立班副參頭眾門迎兩序入堂參頭堂主詣侍司同請住持下行同堂眾接迎入堂據座侍者一班問訊側立兩班如常出班問訊畢侍者燒香一炷問訊住持請法亦如常參頭領眾鴈列插香喝參三拜退分東西班後鴈立諦听法誨開示已參頭領眾如前排立三拜即出門外右立揖送住持兩班隨至寢堂插大香一片九拜而退次詣侍司插香三拜參頭副參同往兩班人前一一拜謝當免香禮及警眾法器附月分頭知夫鐘魚皷板乃集僧號領之法器也增一阿含云阿難昇講堂擊犍稚者此是如來信皷也皷者謂擊動發聲也經論中多名揵槌聲論翻犍巨寒反稚音地此名鐘磬鈔云僧者以和為義若不齊集相有乖離御法則無成決之功被事必據入非之位四分文云當敷座打犍稚盡共集一處五分云諸比丘布薩時不時集妨行道佛言當唱時至若打犍稚若打皷吹螺使舊住沙彌淨人打不得多應打三通吹螺亦爾除漆毒樹餘木銅鐵凡鳴者听作若無沙彌比丘亦得打鈔又云約僧多少就事緩急量時用之然打鐘法鈔記中引三千威儀經并軌度圖經祖師所撰及諸經論言三通者即是三下圖經云集三乘也擊數不等若眾法講說宜準四十下為式頗得其中圖經云執杵定心虗揩十下尼鈔云不得大打驚動眾心漸稀漸大乃至聲盡方打三下名為三通其長打之法初四十下如前增兩四十共百二十第二四十下作兩節前十八下生起同前中間十九至二十二共四下聲盡方打此救四惡趣苦獄鬼畜修二十三已去後十八下漸漸密小矣第三四十下生起亦同前至後有少異從三十六去打三下名三通末後二下名息槌圖經云念三寶存五眾眾各八輩四果四向故以四十為差三通乘之謂三乘也則百二十為節若比今時所作三下則同三通則異矣鈔又云若有惡趣受苦眾生令得停息故付法藏傳云罽膩吒王以大殺害故死入千頭魚中劒輪繞身而轉隨斫隨生若聞鐘聲劒輪在空如是因緣遣身向令長打使我苦息即增一阿含云若打鐘時一切惡道諸苦並得停止今列式于后若結說安恣諸羯磨事及上殿下殿送官員尊宿諸山檀越到寺昏曉齋粥各鳴樓鐘擊數多少量時緩急如上已明其曉鐘者破長夜警睡眠昏鐘者學昏衢蘇蒙昧六道三塗停酸息苦也僧堂前鐘者不以時限維那主之堂司行者覆維那鳴之若開講打靜三下放講二下齋粥應皷八下若三千威儀經後七法中縣官大火大水賊盜此四隨時會沙彌三下會優婆塞二下呼私兒一下若皷之號令各有其所法堂皷結說安恣諸羯磨事開講說法皷擂三通上磉再轉三通小座湯特為茶各長擊一通退座三下若借座借皷鳴法堂下間皷齋粥二時鳴皷三槌九擂上磉復三槌九擂若轉藏鳴藏皷若開浴有浴皷茶湯茶皷發更更皷務令知時也眾法講說集眾及開小靜先鳴廊下板三通開浴三下大普請及齋粥打大木魚厨司普請小木魚開大靜及齋粥鳴大板三通大板者長板也若請茶湯須緩擊照應行禮請茶三下方丈請茶湯鳴寢堂板庫司茶湯鳴庫堂前板報眾鳴諸寮前廊下板大殿有大磬住持上香及禮懺課佛時鳴之殿堂行香各處有鐘不許亂倫乖違法令茲筆其略乖於無窮所謂鐘鳴鼎食三代禮樂者於斯可見也月分須知正月旦上元節諸寺殿堂多修懺法或供佛天宜各專誠祈一年之福也官員檀越致賀門狀式兩序進退山門禮節輕重合宜不可違例隨方毗尼毋易毋局二月望佛涅槃當修例堂司行者卛眾錢送庫司營供養住持首座宜開春講訓誨弟兄不暖不寒正是著鞭時節豈可虗望喪光陰整理莊田提督農務三月分寒食節祖堂祠堂鋪陳供養照例諷經掃洒祖堂禁採茶筍蔭山林四月分如來誕庫司嚴設毗藍園浴佛營供養諷經方丈呌喚江湖點心維那差說戒安居行事人牌及出禮誦等圖十五日晚請小座湯禪規有十四日十六日結夏或有律院安居前三日先呪沙水留大殿於安居日撒洒制後三日茶湯看經祈禱了住持啟講五月分建青苗會或出經單或集眾看經或營供養或到田所行道並宜隨方首座開晚講至暮習讀䇿勤來學諸庵塔中有老成者亦當溫存六月分酷熱做中夏講筵開歇在人行之九旬修道尅期取證住持首座宜加鞭䇿此非細事宜合醬做醋麵豆豉事計等物七月分修父母懺誦梵網經設蘭盆供而解夏等禮具如自恣儀中請監收須擇人八月分兄弟出入參訪知識裝寒覲省勿失規矩灯火可親自宜勉之九月初一日做律師忌或開秋講或說文字提調諸莊翻田土十月初三日做南山祖忌宜整塘砌堰修造役工做蔬菜年計等物十一月分冬至節做供養可隨方火爐頭邊正好校量祖典十二月分佛成道營供養住持計筭錢糓簿書搬量米麥五味之屬或兩序進退每事修例可也掃洒殿宇習修歲懺預辨賀年儀物習讀儀古人云業精于勤荒于嬉今之人少有自勤非策而勤之則不能精于業也古來學肆春秋長講令止於夏中以了故事制後三日祈禱畢四日齋前住持啟講又三日首座宜啟晚講五日初去便乃習讀掛習講牌於法堂每至參前上殿後住持令行者打靜鐘三下至昏黃時學子提灯至法堂而與科目者各宜努刀西堂耆舊亦當與席作成叢林也直日侍者送引子與維那唱二火後住持至法堂就座維那鳴引二下使眾寂然無聲有處堂賓二司每夜輪行湯茶喝三後維那鳴引二下直日侍者至維那前問訊取覆講盛鬮合子安住持机上住持問訊了開鬮合住持信手混括一鬮付與直日展開呈住持了高聲喝云某甲侍者覆講却將拈出之鬮以示覆人了仍入鬮合中還置維那前有處併將引科策文二鬮一道拈定對眾白之次第而出而堂司行者將燭二條置覆講人前卓上覆人却覆本日住持所講之文不可覆以次人講預宜研精覃思說驚人語使眾悚听而荒怠者寧不知愧覆畢維那鳴引二下直日再至維那前取引科鬮合至住持前拈了唱云某甲律師引科言文還鬮合置明灯如上引科畢取合再拈策文人鬮或一人或二三人命出住持行禮如上維那鳴引二下䇿文人將所讀冊子置維那前指其起誦處却於中間大香爐前叉手朝裏立以誦所讀之文須言詞了了詳緩合節起止可觀如誦多文長維那鳴引二下䇿文人住聲止誦再進維那前問訊取所誦冊子回元坐處其次拈出䇿文人亦如上誦之俱位畢住持首座比校䇿文人善誦者賞之以紙筆墨扇等不善誦者亦當罸之以警諸怠習讀畢住持回方丈維那鳴引二下䇿文人出聲誦文引子回與直日頭首各回司三科之人各宜進業夜夜如斯若住持他出前堂首座攝行其事中夏後觀時涼執一或講或歇在住持行之然而欲成人才令在䇿勵尺璧非寶豈可虗喪光陰也耶新來兄弟酋先熟讀律宗會元及諸序文請益師處說通義路方可引科引科者乃引住持來日所講之文學思俱到左右逢原方與覆述之科若也文師口講在紙中安能見於斯義也
