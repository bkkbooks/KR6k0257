body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述歲專使請住持凡住持補處公帖已定文命下寺庫司會兩班耆舊茶卜日通先書命製山門疏茶湯榜擇才德人用絹素製榜修廣如法庫司送紙諸寮作書差能事行者老郎通書請人充專使或上首知事耆舊後堂維那等和會已定若耆舊頭首充專使知事一人同去掌財議事具寫本寺該管田産什物須知迎接從儀一切畢備管待專使一行人至超程日詣諸寮人事帶行僕從聲喏大衆門送山門講茶湯禮上首知事去下首知事行禮頭首去上首知事行禮揖坐了燒香揖香了歸位點茶再起燒香揖香點湯收盞了便上轎行山門下釘挂面裏設位請兩班耆舊光伴專使到彼寺先見知客同到庫司接送安下備門狀見頭首草寮無門狀詣侍司詳稟來歷侍者令客頭𥨊堂鋪設卓袱安疏帖侍者入方丈呈門狀住持出專使問訊請趺坐住持廟立專使插香大片展具三拜進前云某蒙山門使令攀屈尊嚴得奉尊顏下情不勝感激之至又三拜詞云即日孟夏謹時恭惟新命堂頭大和尚尊候起居多福復三拜收具住持低身祗受禪規各答一拜今不行者為觸禮妨衣也詞云叨膺請命有玷宗風且厪遠來不勝多感專使呈疏帖住持領已侍者揖坐喫茶了送客位堂司行者鳴鐘首座領衆詣方丈申賀庫司送香首座知事各插香一片詞云即日孟夏謹時恭惟某處堂上大和尚尊侯起居多福法門多幸伏喜榮選歡動叢林下情不勝感激之至住持答云自揆踈謬誤膺此選禮意過勤不勝多感衆散知客領專使巡寮畢次第呈納本寺須知從儀什物如住持未𠃔所請再三勸請𠃔命行禮同前當晚特為湯罷藥石夜湯果皆請兩班耆舊光伴庫司排辨受請已次第煎點專使點對簿書交割什物卜日起程禪規受請了次日升座委曲上下提誨學者致謝專使也律西堂頭首住持專使到寺先見知客同到侍者引見方丈插香展拜相看禮同喫茶送客位次詣諸寮人事了稟侍香同詣方丈咨稟某寺今請某人住持稟訖侍者同詣受請人寮中相見插香行禮同前如不𠃔即詣方丈咨扣同伸勸請受請了方丈請新命及兩班耆舊茶新命送客位次第受賀巡寮人事當晚方丈請新命專使特為湯藥石湯果兩班光伴禪規受請了專使拜請方丈和尚來日為新命和尚引座蓋在勸請舉揚令法久住故也呂頭首受請法嗣若頭首是嗣法弟子先誦侍司通稟住持請求法衣至日詣𥨊堂伺住持出問訊付法衣有法語新人受衣亦有語抽衣了却披法衣住持趺坐大展三拜已詞云一生取辨仰愧先賢來請既勤難逃上命下情無任惶懼之至又三拜詞云即日謹時恭惟堂上本師大和尚尊候起居多福又三拜收具進前問訊住持云囊錐已露花雨難逃幸是當人伏惟歡慶次拈疏帖各有語若例禪規住持引座座左設前住持位右排列疏帖下座了新命出住持前問訊付法衣有語受衣亦有語拈疏帖舉話有無不拘然亦在人行之調煎點住持當代專使先當與住持議定齊嚫輕重合禮兩班耆舊鄉人法眷辨事貽嚫齊料費用專使親送納庫司置齊至日專使詣方丈插香三拜請初展詞云今辰午刻就雲堂特為伏望慈悲降重下情不勝感激之至禪規二展三禮今大展三拜也兩班單寮方丈客頭同專使行者一一詣寮稟請挂牌僧堂鋪設主席知客板頭排專使位至齊時專使僧堂前伺住持入堂問訊接送歸位揖坐歸中問訊揖衆坐中爐上下間外堂燒香了往住持前問訊次堂內先上間次下間外堂先下間次上間問訊了中央問訊食遍燒香一炷下䞋了出外堂歸位齊了折水出鳴鼓專使入堂燒香中爐上下間堂外已往住持前問訊上下間外堂了行茶遍如前問訊了收住持盞專使行禮三拜云即日云云了此日水伏蒙和尚降重下情不勝感激之至送住持出再歸堂燒香一炷大展三拜巡堂一匝并堂外歸中問訊收盞鳴鼓三下退座專使詣庫司謝辨齊次請住持至晚藥石夜湯果皆當請兩班耆舊光伴陽煎點西堂頭首新命專使詣新命前議定方丈嚫施堂嚫貼嚫至日粥罷專使詣方丈插香稟請云今辰午刻就雲堂備水飯特為新命和尚伏望慈悲俯垂降重答云謹遵來命復詣新命前稟請同前禮方丈客頭同專使行者請諸寮齊時覆新命赴堂堂前俟住持同入堂問訊隨入先揖住持歸位次揖新命歸住持分手位燒香行禮並同前下食行䞋茶畢先收新命盞專使至前行禮並同前即日云云了此日水飯特蒙和尚慈悲降重下情不勝感激之至禪規二展三禮送新命出後門專使入住持前行禮如上展具三拜送住持出前門歸堂炷香展三拜巡堂一匝并外堂中間問訊收盞鳴鼓三下退座晚湯果藥石光伴同前雲山門管待新命當代專使衆知事會議管待嚫禮食品如儀上首知事隔日詣新命前插香拜請次詣客位稟請專使令庫司客頭請兩班耆舊光伴詞語行禮並特為同釘挂𥨊堂鋪設住持廟位專使住持上首兩班住持左右耆舊對面侍者接知事下位遠接僕從當支犒勞騰西堂頭首受命管待亦就𥨊堂敷設住持主位新命對面位專使新命分手位兩班耆舊光伴左右位詞語行禮並同前致辭衆上座茶湯當代住持起離日上座有退院法語致謝兩班耆舊大衆下座鳴鼓三下面法座立普與大衆問訊禪規觸禮三拜鳴樓鐘等法器送出僧衆門送兩班由近及遠行僕外排立候送山門首預當釘挂設庿位面裏坐西堂大耆舊分手光伴首座居主東西班兩邊朝坐首座行禮揖坐揖香歸位點茶收盞再起燒香揖香點湯湯罷便上轎兩班耆舊備轎遠送住持當力免之專使一行人先詣諸寮辭別鳴樓鐘俟住持轎隔遠方可止之雨見職首座辭衆須令專使詣方丈稟備法座上堂有法語辭衆座不敷設下座先辭住持次面座立普辭大衆問訊禪規皆觸禮三拜山門首設位講特為茶湯兩班耆舊光伴上首知事行禮鳴樓鐘送山門若西堂次頭首辭衆臨行先同專使上方丈插香稟辭禪觸禮三拜次巡方寮辭則山門首講茶湯兩班光伴行禮鳴大鐘送並同前禮露入院古法挑包頂笠而至如遇迎接下笠問訊或值官貴放包祗揖到山門首下包笠炷香有法語至僧堂前歇包後架濯足回僧堂前取衣披搭入堂有參隨人同進聖僧前大展三拜巡堂一匝參隨人先出維那送歸鉢位問訊禪觸禮三拜挂搭已到佛殿有語禮拜次土地堂祖堂有語知事請入方丈據室次開堂祝壽禪宗近代大川和尚赴淨慈笑翁和尚入育王後無所聞也結入院新法新命到來當看安泊處近遠近則衆往祇迎遠則兩班耆舊而已專使預當計稟批免勞衆兩班耆舊炷香人事罷光伴陽果至日入院庫司當一一排辨堂司行者隔宿挂牌至時鳴大鐘等器大衆門迎行僕列外新命到門炷香舉語至佛殿燒香法語大展三拜斂鐘歸僧堂挂搭衆入堂已新命入堂炷香大展三拜參隨人同展三拜維那引巡堂一匝參隨先出送歸鉢位挂搭禪觸禮三拜或有兩班送歸鉢位次土地堂祖堂炷香皆有法語入方丈據室侍者燒香一炷問訊了垂語知事先具狀備卓袱問訊行者呈寺記印新命看封付知事開封視篆訖就狀先僉押書日子打印過付衣鉢侍者收知事全班列前上首知事插香三拜云即日云云茲蒙和尚光據法筵下情不勝感激之至答云叨據名藍下情愧悚禪規二展三禮諸山各插香草賀却當免香首座領衆插香展賀耆舊各插香鄉人道舊法眷隨賀于后客頭揖請諸山兩班耆舊就座獻湯次請官客諸山舛座前點心若前代別遷未赴或退作東堂據室之前講交代禮受賀了鳴僧堂前鐘新命躬送前代歸寮炷香人事次首座領大衆人事行僕衆皆三拜呈寺記狀式當寺庫司比丘某甲寺印一顆右謹申納新命堂頭大和尚伏候慈旨年月日當寺庫司比丘某甲狀為庫司請新住持齊據室人事了知事預具狀備拌袱爐燭詣方丈插香請齊三拜云即日云云午刻就雲堂備水飰祗迎伏望尊慈特埀降重下情不勝感激之至禪規二展三拜呈狀方丈客頭收庫司客頭鋪設僧堂住持位管待禮同狀式當寺庫司比丘某甲右某甲啓取今辰午刻就雲堂聊備水祗迎伏望尊慈特垂降重謹狀年月日當寺庫司比丘某等狀伏請新命堂頭和尚大宗主尊座前具位某等謹封霜開堂祝聖古者輦下列剎朝廷差官馳命敦請就某寺開堂官給錢料設齊近來開堂座下設位至時侍者分付客頭鋪設法座報寮挂牌䨱升座了巡寮具寫官員諸山名位預呈方丈專使分付座左鋪卓袱排疏帖和會宣讀人先送看過公文例係維那宣山門疏首座宣餘疏次頭首宣庫司備香送上方丈預請諸山白槌座前對面排官員位次裝香秉燭覆侍者次覆方丈鳴鼓集衆禮與常法同侍者同專使入請住持行者鳴鈸花幡挑燈從引至法堂位前如受請時未拈衣當舉語披法衣次專使插香行禮三拜云即日云云此日伏蒙和尚光據法筵下情不勝感激之至禪規二展三拜先呈公文有法語付維那宣白行者拈疏次山門諸山江湖疏一一呈拈舉話宣讀若見任官疏請開堂官員須先親自呈疏次山門疏住持指座有語升座拈香祝聖次拈府縣官寮香若建寺捨田大檀越當拈香侍者逐一度香惟法嗣香懷中拈出拈了自插爐中據坐侍者燒香下座兩班出班問訊畢侍者登座燒香問訊禮與常同座右白槌云法筵龍象衆當觀第一義提綱敘謝官員諸山云開堂祝一人壽不敢讚德專使兩班耆舊大衆略提過謝之結座白捶云諦觀法王法法王法如是下座諸山及官客略送一兩步知事接送客位管伴客頭行者即進爐燭一字排前先專使人事堂司行者喝云諸山人事次西堂人事當免香禮知事一班人事三拜禪規二展三拜次首座耆舊諸寮大衆各插香人事三拜次莊庫庵塔法眷鄉人暫到先同衆行禮通用詞云伏蒙和尚光據法筵下情不勝感激之至禪規觸禮三拜答云叨據名藍不勝愧悚進罣罳掎子據坐侍者插香大展九拜小師插香大展九拜皆無詞語次諸山行者方丈行者親隨人六局次參頭領衆插香禮三拜轎番直斤莊甲作頭諸寮供過老郎寮主領頭參拜住持即往客位致謝官員諸山以盡禮也金新命巡寮諸寮舍敷陳香几位次爐燭香各具威儀次第俟巡寮方丈客頭先行通覆住持至諸寮頭首先於門前下手立迎入請趺坐插香住持答香略敘寒溫致謝送出聽呌收香次第巡寮畢歸方丈照拂官客諸山生僧堂特為茶湯住持若要省事預批免茶湯榜庫司寫請狀備拌袱爐燭詣方丈插香行禮禪規二展三拜請云齊退就雲堂點茶特為伏望慈悲降重請已呈狀令客頭請兩班耆舊光伴挂牌報寮僧堂鋪設住持位齊聞長板鳴炷香展拜巡堂請茶齊退鳴鼓集衆上首知事揖住持入堂歸位揖坐燒香一炷住持前揖香中問訊立行茶畢瓶出往住持前揖茶退身龕右出炷香展三拜出堂引全班至住持前行禮謝茶詞語即日云云如常送出復歸堂炷香上下間問訊收盞退座若有榜當先安下處呈新命入院日挂僧堂前上下間茶湯只炷香稟請繼覆云請和尚湯罷就座藥石此僧堂特為茶湯律院少曾講行於理甚當行在人否則亦當知其禮也狀式當寺庫司比丘某甲右某甲啓取今辰齊退就雲堂點茶用伸陳賀之儀伏望尊慈特垂降重謹狀年月日當寺庫司比丘某甲狀湯狀只改湯字餘並同可漏端狀拜請新命堂頭大和尚尊座前當寺庫司比丘某甲謹封麗檀越諷經建寺捨田大檀越庫司差人嚴設祠堂備供養粥了集衆詣僧堂知事先到燒香點茶湯上供養住持至炷香歸位維那舉經回向水管待專使知事預稟住持專使厚嚫宣疏帖人䞋衣鉢閣備貼䞋重輕合節至日𥨊堂釘掛鋪設位次請兩班耆舊光伴中設專使特為位請客侍者躬請專使餘人則方丈客頭稟請禮與特為同玉留請兩班兩班俟管待專使畢午後俱詣方丈咨稟告退首座報集西序都寺報集東序方丈垂情委曲送出侍者令客頭備柈袱爐燭湯具住持同侍者一一詣寮點湯勉留客頭先報寮出門外右邊迎住持入門居主位分坐侍者燒香行湯收盞住持詳盡勸勉已送出門諸寮庫司同若職滿俟久亦當詣諸寮點湯勉留盡主禮也候住持齊後間時再上稟辭次第進退出參放出入入院之先未參府縣官屬即當具門狀參見次謁檀越寄居官貴諸山亦用門狀合訪及處在知事逐一稟覆住持出門令行者傳語首座維那諸頭首知事當詣方丈候送庫司當探計住持歸斯令堂司掛牌報衆候入山鳴僧堂前鐘集衆門迎住持出轎問訊云勿勞大衆即往佛殿土地堂燒香首座領衆至方丈接已衆退客頭揖請兩班耆舊獻湯略敘話而退方丈行者插香禮拜次參頭領衆禮拜住持須巡寮報禮城郭近便朝暮出入無𣆅不必講行凡公出遠歸首座領衆迎接住持傳語免詣方丈或密歸鉢位伴衆食挂鉢了方丈客頭喝云方丈和尚巡堂人事衆下地住持燒香一炷巡堂一匝出堂喝云堂頭和尚傳語不煩訪及繼上方丈或密回方丈兩班耆舊皆當詣方丈問起居當炷香獻茶欵曲敘話而散崑交割什物方丈請兩班大耆舊茶詳說家務次至謝庫司茶眼同撿視御書寶器砧基物件先呈方丈次呈頭首耆舊逐一點對交割計算財穀簿書分明見管若干具呈方丈參照須知諸莊佃戶換契住持備榜諸莊曉示諸方多於住持交換之際執事作弊苛取錢物後患非輕可不審諸庫司此日備點心岡方丈小座湯律院亦此行之不無少異禪規云前輩四節行禮惟結夏一次兄弟恃強位爭高下因而止之叢林蔑聞良可嘆也按式有三座第一座分二出東堂西堂首座光伴第二座四出兩班耆舊頭首一出頭首二出知事三出西班耆舊四出東班耆舊第三座分六出本山辨事諸方辨事首座光伴隨職高下分座職同者次之侍者預備草圖呈方丈議定略有差池各須容忍至日依名書照牌午後備卓袱作一二三座陳列𥨊堂下間東西堂前堂都寺請客侍者各詣寮請云堂頭和尚請今晚就寢堂特為獻湯餘頭首諸寮方丈客頭行者請之𥨊堂釘挂排位秉燭裝香竟客頭行者覆侍者次覆方丈鳴鼓第一座客集侍者迎揖住持接敘寒溫入位立定侍者特為人前巡揖坐問訊坐已歸中燒香一炷往特為人前揖香問訊歸中立鳴板二下行湯復進特為人前揖湯問訊歸中燒香伴香鳴板一下收盞鳴鼓三下退座第二座客至迎入位立兩侍者上下相望巡問訊揖坐燒香一炷分位頭巡揖香揖湯燒光伴香收盞鳴鼓三下退座展具謝湯免則止之第三座客集迎接行禮並同前此座位多分座頭巡問訊須要倫序庶雅禮法禪規四月十五日結制十四日參前請小座湯行禮
