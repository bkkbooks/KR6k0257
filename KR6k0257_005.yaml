body:
  text: 四明演忠律寺住持嗣祖比丘省悟編述月聖節啓建啓建滿散佛祖誕忌日用諸儀律中無文今借澤山師兄禪林備用為式編之然上堂入室告香備香問訊兩展觸禮之類皆除去之原其坐具之制為護身護衣故觸禮之法頭若至地身衣有污非所宜也如白佛回向右語等文謹嚴切當有可用者依而行之中間有用禪宗公案却以律苑事相改而補之以備乎行事云爾列之于后啓建行香鈸及跪爐多有律院亦如是行香今取之除去揖香出班問訊獨此一項行香鈸外皆不用禪規二展三禮今律規併作大展三拜詞語先寒暄次敘事一併稱之住持不答拜但低身立受若免拜則問訊直陳其事禪規觸禮之法有污身衣盡除去之大展九拜詞語先敘事次寒暄並同禪規交代職事更立為主律院不曾行故去之特為茶湯而揖坐揖香揖湯鳴板鳴鼓並同禪規新受職人送歸鉢位等禮並去之啓建屆期禮加嚴肅僧員給假不許容情堂司預書黃榜輪僧簿及上殿經目預辨啓建大牌及啓建疏須用黃紙貼簽如法楷書嚴肅禪規先五日維那委書記制右語先呈方丈却染疏隔宿備拌袱爐燭香合維那具威儀帶堂司行者人僕拓拌詣方丈僉疏堂司行者通覆住持出即燒香稟云來白啓建某節拜請和尚僉疏呈疏僉了問訊而退此禮甚重理當依行大殿嚴設香花燈燭湯茶供儀手爐鐃鈸畢備來曰早懺前鳴大鐘衆列殿點茶湯侍者下畢鳴行香鈸住持上香侍者捧香合禪規又有維那揖香東西兩班對出上香問訊之禮香畢大衆同展三拜此拜佛為告祝天壽也住持不收具就跪爐非法也維那白佛宣疏至右伏以住持再燒香展拜跪爐知客跪進手爐侍者跪進香合宣疏畢知客跪接爐住持收具或住持受州縣關請不在而前堂首座偏位跪爐堂司行者跪進手爐復跪接爐座司茶頭跪進香合維那舉楞嚴回向啓建堂司行者隔日將輪僧簿請住持頭首衆僧僉書上下字名具寫差單輪排經目于上揭挂殿內至日住持同衆上殿看經各務嚴肅鳴大鐘上殿各炷香三拜歸位看經維那當詣殿燒香一炷大展三拜知客躬當點茶湯庫司嚴設香燭點心湯荼堂司行者供送恐有缺典維那時常照拂至晚鳴大鐘下殿每日僧員依戒輪定堂司庫子直殿行者時時守坊官員到來拈香鳴鐘集衆諷經方丈庫子迎送凡遇聖節啓散暫到客司給由隨身照證今時不行住持領衆看經知事營供表嚫務在虔誠當報水土之恩也滿散節目並同堂司製疏具列經文例留交割準備刷具凡住持公出歸日不問近遠鳴鐘集衆門迎詣方丈人事衆散住持更不用巡寮報禮也自佛偈玉毫騰輝金色炳曜具大人相號正遍知瞻之仰之福滿沙界又偈大圓滿覺應迹西乾心包大虗量周沙界回向上來諷誦洪因端為祝延聖壽萬安金剛無量壽佛仁王菩薩云云至波羅蜜伏願皇風永扇帝道遐昌佛日增輝法輪常轉跪由暫到一僧某甲上座今月巳日恭遇天節已於本寺啓散訖憑此為照者年月日某甲寺知客某押給右語啓建伏以紅日升時四海賴照臨之慶紫雲深處常年念伸祝頌之誠以不可思議之功勛倍無有算數之壽量皇帝陛下恭願淵獻珠山獻玉令夷夏之歸仁車同軌書同文盡山川之一統但臣僧某甲下情無任瞻天望聖激切屏營之至謹疏滿散伏以天開閶闔慶流虹繞雷於斯辰人效華封悉望日瞻雲於此際爰畢三旬之華藏聿嚴萬歲之山呼恭願歷數在躬文明至治九五福曰富曰壽無強惟休八千歲為春為秋自今而始右語前敘意與後啓建牌恭惟前敘意一同今不重筆也啓建牌式純用黃紙楷書大元國某道某路某寺月日恭遇天壽聖節本寺預於今月日恭就大佛寶殿啓建金剛無量壽道場一月日逐日輪僧上殿披閲經文宣持密號所萃洪因端為祝延今上皇帝聖壽萬安者右恭惟佛日洞明天龍昭格年月日都監寺臣僧某甲住持臣僧某甲謹言盈聖節官請開講今時多於鄉下差請而來先用參官禮見上等以順世情合用禮儀于后轎番四人排燈二人行者打鼓備鼓槌侍者一人涼轎并席油燭法被香合拂子大香一片宜避諱字鼓轉通禮宜官員一人執手爐至方丈請説法重祝讚也侍者問訊住持坐轎香花鼓鈸迎至法堂前側首出轎衆官前問訊衆去頭袖住持却轉身至中間手朝東西普同和南登座侍者隨往上座以合蓋盛大香鼓絶捧呈住持祝香云此香不假裁培之力天生自然密為薰染之祥神化莫測價重三千之界鼻資八百之功今月日恭遇天壽聖節奉為某道某路合屬文武官班熱向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願閻浮提統是封疆殑伽沙俱為壽量侍者接香以左手插爐中右手拈從香一炷蓋合插香宜子細不可墜下住持上腳踏問訊欽衣趺坐中間有著鞋而坐者以便於後起身也侍者下座問訊畢至東首側立次諸山出班問訊叉手出班合掌歸位住持宜起身受禮不起亦得而無彼此相敬之儀畢侍者揖衆官坐却登座開合左手上香一炷蓋合轉身提坐具問訊住持謂之請法也側立過拂子與住持住持舉提綱云今觀釋迦如來昔為護明菩薩未離都卛已誕王宮未轉法輪已度諸有豈在無憂樹下出乎大術胎中九水共沐一身八方各行七步指天指地三界稱尊食麥食麻六載成道四十九年三百餘會經通五人共説律為金口親宣所以道戒德難思冠超衆象為五乘之軌導實三寶之舟航依教建修定慧之功莫等住持佛法群籍於茲息唱更能揭開戒網拶透玄關明持犯離持犯相萬籟吟風窮真妄源千江印月超凡入聖豈假他求見性明心還須自覔水朝東海浩浩乎蕩蕩乎民無能名焉星拱北辰昭昭然歷歷然吾無隱乎爾説禪講律共趣佛乘卛土普天咸歸王化良久云九天閭闔開宮殿萬國衣冠拜冕旒了却以拂子安床東以便後取住持合掌回向云某道某路總官府或州或縣或司隨宜添改月日恭遇天壽聖節預於月日恭就某寺大佛寶殿啓建金剛無量壽道場一月日逐日輪官上殿拜首拈香僧衆披閲經文揄揚佛號此時命某寺住持臣僧某甲升于此座講演毗尼妙儀一席所萃洪因端為祝延聖壽萬安者次敘謝以手揖衆云某甲樗櫪不才濫叨律剎今月日恭遇既曰祝贊不應敘謝可於回向後便結座今且隨時出之天壽聖節伏某州某司帖請某甲於今月日開請祝讚不敢固辭今對人天衆前甚愧疏陋開講之次伏承某道宣慰司都元帥府諸位相公某道路合屬文武官班諸位相公或行省官或朝廷差來官當先入之教禪律三宗諸山師德江湖名勝高人俯臨座席為法作證祗對之間不勝戰汗祝聖人壽不敢一一敘德裝讚即容下座詣前申謝伏惟慈察侍者於座東取拂子與住持了結座云記得律中道境既無量戒亦非一略則八萬四千廣則無量無邊且道界境戒量與當今皇帝聖躬壽量是同是別良久云天上有星皆拱北人間無水不朝東下座云久立衆慈伏惟珍重座下即謝衆官及諸山師德為法作證也昃千秋節開講祝香提綱結座規式並與聖節同祝香云此香産靈於清淨覺地育秀於光明寶林一統俱沐其恩連城豈酬其價恭願配德乾坤合明日月紹赫赫炎炎之祚成巍巍蕩蕩之功克享天心永作人主提綱文殊師利是法王子輔釋迦如來吉祥觀音稱安樂人佐無量壽佛雙絲成線二掌浪鳴觀我如來淨法界身本無出沒大悲願力示有去來暫離兜率陀天下降迦毗羅國住胎出胎示八相而成道密説顯説以五時而度人經律論三藏鼎分教禪律三宗派別機緣不等提誘多方軌導聖階戒德獨超於衆象住持佛法毗尼實冠於群宗立教雖有萬門到家初無二道法華開聲聞而佛月落不離天涅槃扶小律以談常水流元在海超出四重樓閣決開五義分通翠竹黃華盡是真如般若溪聲山色無非長舌淨身將此最上乘以永無疆祚似玉藏右虹氣隱于山川如雲升天龍澤沛乎宇宙慈風伏皇風而扇令旨體聖旨而行歲祝千秋日享五福然雖如是未審祝壽底句如何舉似良久云曰壽曰富而多男願效華封之祝宜民宜人而受祿再賡周雅之章結座古人有言大德必得其位必得其祿必得其名必得其壽因成四句瑤光貫月赤光高仙侶排空奏玉簫梵壽如來添祿算九天王母進幡桃辰聖節祝香待衆宮立班喝拜了舉云僧祝讚時却懷香出衆對牌座前立定執香云威音王如來前栽倍種子三都田地獨露先春長生天氣力裏茂長根苗萬國封疆普大蔭某道某路月日恭遇天壽聖節預於月日恭就某寺大佛寶殿啓建金剛無量壽道場一月日若啓建直云此時無為若習儀却云今當滿散此時習儀行禮無奉為若滿散却云此時恭就某處滿散奉為本路合屬文武官班將此寶香爇向爐中端為祝延今上皇帝聖躬云云皇帝陛下恭願一人有慶遙瞻北關之尊萬壽無疆願效南山之祝了歸元位立之宿聖節放生衆官拜了僧道祝讚畢不用懷香至放生處但朝北念放生文云聖誕今朝瑞氣多歡呼萬歲滿山河大恩大德充天地鳶自翔雲魚躍波念訖而散列日月蝕祝香伏願此香根盤一統葉覆大千孕日月之華精鍾天地之秀氣某年某月日日夜月有食之某路某洲某司官與合屬官班僧道士遮人等隨有無添減恭就某處用伸救護此時將此寶香熱向爐中專用祝延今上皇帝聖壽萬安次伸奉獻日月宮天子以助威神所冀妖魔蟇退舍陽德素魄還光究兩目於上天照群生於下土念訖誦呪回向張祈雨請晴祝香伏願并祈雪此香天地孕靈古今挺秀栴檀林更非別本兜樓波獨羡佳名香雲心一縷才飄甘澤通天色十分大沛開朗佛天願雨佛慈有感聖德無私動下九天即解龜疇之拆霖為三日足沾魚夢之祥觀音願雨救苦導師觀音慈父將寶瓶之淨水遍灑楊枝沾大地之焦枯頓蘇禾稼一雨三日惠澤滂沱萬廩千倉歡聲浹洽諸龍願雨上祈天造攸扣龍君早興慈意之雲大注悲心之雨五禾日秀百穀時登民慶常豐年書大有祈晴釋迦世尊觀音慈父施無畏力用大悲心掃淨碧天莫使癡雲作孽撥開皎日陡教大地生輝五禾無淹溺之憂六種有收成之望如斯祈懇即賜感彰祈雪一冬得雪則年可格於屢豐三白呈祥則天妙施於大巧裒集邇遐僧堂道昭告上下神祇天道雖遙人心可感釋迦調御觀音導師以父母心副衆生願溥三輪功用煎四大海水點點成華現十力神通遍一統封疆皚皚積玉寒大殿藏殿祝聖凡旦望之日早懺之前衆誦大悲呪一遍住持燒香呪訖維那舉南無無量壽佛號衆念三聲維那回白云白佛喝如前某路某州某寺住持臣僧某甲茲值月旦望今辰謹集僧衆恭趨寶殿諷誦祕章揄揚佛號所萃洪因端祝延亦有住持自回向今上皇帝聖壽萬安皇太后皇后齊年皇太子睿算千秋遙望聖躬祝陪天算金剛無量壽佛延壽王菩薩摩訶般若波羅蜜了不誦小經便乃禮懺懺畢過堂早粥粥了鳴僧堂前鐘集衆鳴鼓轉藏行者打鈸鼓鈸無所免之維那舉消災經繞藏行道三匝以表法輪三轉期帝道遐昌也立定結經維那舉南無無量壽佛回向云大圓照中有華藏海功超造化道絶名言三光電卷而實相間六合雷奔而湛然寂不思議法難盡讚揚諷誦消災威德呪經運轉天宮法寶輪藏稱揚佛號所集洪因端為祝延云云如前又云三轉法輪於大千其輪本然常清淨天人得道斯為證三寶從茲現世間今時初八二十三齋日亦行轉藏諷説來朝廷祈禱凡遇焚修祈禱須虔誠齋沐如法鋪陳花果新鮮香燭殊勝殿宇時時灑掃僧衆整肅威儀官員拈香加禮迎送住持知事無涉他緣耆舊齋舍常切嚴淨期必致效功有攸歸山門祈禱庫司先覆住持意旨預呈維那堂司行者報寮挂牌二時集衆諷誦啓散嚴設供養克期功效各冀專誠暑如來降誕將屆誕期堂司行者率衆財具數送庫司營供養此古法也在住持講行維那命作者製右語既有霅溪法師禮文不製亦得僉疏並與聖節同庫司預令行者嚴設毗藍園內安太子銅像煎香湯安二小杓於盆內大佛前敷陳供養至日辰時大衆各具威儀同詣大殿如諷誦而立住持燒香歸位立定維那舉浴佛偈文如后有處多是首座舉經舉佛可隨方也右旋浴佛宜備銅錢各歸蒲團位衆展具住持上香復位同衆三拜不收具進前獻湯進食侍者下竟復位衆三拜上香下嚫點茶衆三拜禪規鳴鼓三下講特為鱧衆跪住持執爐維那舉香華二偈如結界儀中了住持舉禮文總白頭至三請已衆起身住持舉白云佛偈天上天下無如佛如禮文中了維那進前宣疏了舉變食呪歸位衆三拜做禮如禮文中以下皆維那舉唱做禮畢衆收具舉遺教經或安樂行品了或回向或只念願滅三障諸煩惱偈亦得云云後結云十方三世云云至波羅蜜右旋而散回向云上來諷經功德回向真如實際莊嚴無上佛果菩提四恩普報三有齊資法界衆生同圓種智十方三世一切諸佛諸尊菩薩摩訶薩摩訶般若波羅蜜云云白佛偈一月在天影涵衆水一佛出世各坐一花白毫舒而三界明甘露灑而四生潤浴佛偈我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身右語某道某路某縣某寺稟如來遺教住持比丘某甲與衆比丘等今月初八日伏值本師釋迦如來大和尚慶誕之辰聊營庶羞以伸供養者右伏以兜率天宮不起于座而常説是法毗藍園內乘大願力而示現受生顧上下與四維稱獨尊於三界芳流像教屬此日之誕彌瑞涌龍淵效當年之灌沐本師釋迦如來大和尚伏願運甚深之智海回既倒之狂瀾盛世光明上延聖主無疆壽微塵含識同證如來淨法身謹疏往如來涅槃成道佛忌禮文霅溪法師出之成道之禮亦不可缺而禪林有古語録之于后預日製疏率衆財營供養集衆上香三拜獻湯進食三拜上香下嚫進茶三拜禪規鳴鼓三下講特為禮衆跪舉香華二偈如結界儀中住持執爐舉禮文總頭白佛宣疏變食做禮依嶽法師禮贊禮畢衆收具舉遺教經回向右旋而散並與佛誕禮同白佛偈淨法界身本無出沒大悲願力示有去來又成道正覺山前覩明星而悟道大千界內駕慧日以流輝右語涅槃疏語大智律師出之如芝園集第十三卷中今不再出疏節敘情與佛誕同但改慶誕為涅槃為異耳成道雪覆千山大地春回寒谷星明午夜覺天雲散長空示六年苦行之因證歷劫進修之果某甲等叨承末運忝嗣宗猷深懷麻麥之餐茲焉有愧處奉蘋蘩之供理亦難忘本師釋迦如來大和尚伏願光照臨開發蒙昧大千國土永延聖主福壽康寧一切衆生咸證如來智慧德相秋蘭盆獻供七月十五日蘭盆供堂司行者預率衆財具數送庫司營供養以報父母恩德也染疏僉疏與聖節同至日於大佛前敷陳供養大衆各具儀到殿與南山忌同住持上香衆三拜不收具進前獻湯進食侍者下竟復位衆三拜上香下嚫點茶衆三拜跪不收具禪規鳴鼓二下講特為茶禮住持執爐維那奉香華二偈有處乃是首座舉唱了住持舉禮文總白頭至請佛已衆起立歎三寶呪願了維那宣疏變食歸位衆三拜做禮如靈芝禮文中畢衆收具舉蘭盆經了衆回向云以此修行修善根報答父母劬勞德存者福樂壽無窮亡者離苦生安養四恩三有諸含識三塗八難苦衆生俱蒙晦過洗瘕疵盡出輪回生淨土十方三世云云右旋而散右語蘭盆疏語大智律師出之如芝園集第十三卷中收南山靈芝祖忌南山禮文孤山出霅溪出堪律師出靈芝禮文安律師出將屆忌辰堂司預命染疏與聖節同右語齋路如后住持專誠山門執事備辨東浙律苑維那做南山忌知客做靈芝忌一切齋供所需皆出當忌者職事費錢以為出世根腳若此孰肯留心於祖文者哉悲夫當忌者先委請執事人借辨器皿分頭管之時提點法堂敷陳玩具晝參頭差行者排辨守直法堂挂真嚴設祭筵爐瓶香几一一如儀上間即設禪椅拂子衣架挂法衣下間設椅子經案爐瓶香燭部文而已設床摺者非也堂司行者覆方丈諸寮當晚諷經并覆來日半齋各具威儀散忌諷經參前鳴僧堂前鐘集衆鳴鼓獻特為湯住持上香三拜不收具進前上湯侍者下竟復位三拜進前揖湯問訊三拜收具直日人鳴引子維那舉遺教經回向畢衆散昏鐘鳴集衆諷經住持上香維那舉經畢回向次行堂參頭領衆排前喝參禮拜諷經作寮排列聲喏參拜諷經次日早粥罷住持如常上香上湯維那舉經回向半齋鳴僧堂前鐘集衆如常諷誦排立俟住持燒香歸位立定維那舉南無南山祖師大智律師菩薩右旋從真前各歸蒲團位展具三拜不收具點湯進食侍者下竟復位衆三拜燒香下嚫點茶衆三拜不收具鳴鼓三下講特為茶禮衆跪住持執爐維那舉然香偈散華偈了住持舉禮文總白頭至三請已衆起身住持白真云代有覺人云云端嚴具足云云衆隨念了維那進前宣疏畢舉變食呪歸位衆三拜做禮如禮文中以下皆維那舉唱禮畢衆收具舉遺教經了云願滅三障偈了十方三世云云了大衆右旋而散山門設供無嚫有品食初夜回向悲願深重道大難名忝借潤於餘波致有光於末裔仰冀真慈俯垂照鑑今月初三初一日伏值南山靈芝大師示寂之辰營備香羞預伸供養諷誦經文稱揚聖號所集殊勛上酬慈蔭伏願群機有賴報揚太一芝苑之家風妙智無窮成就圓宗之根器十方三世云云又回向云上來諷經功德奉為南山靈芝大師莊嚴無上佛果菩提十方三世云云如前願滅三障偈亦得右語南山齋忌疏語大智律師出靈芝疏希顏法師出並在芝園集中冬開山祖忌當遵舊典不忘厥祖可力行之若檀越建寺就請開山例當修忌或立事功於山門者勿拘也須當於法堂中間鋪設集衆諷經展拜與南山忌同回向云寶明空海湛生死漩澓之波大寂定門融今古去來之相仰冀真慈俯垂照鑑今月日伏值開山某人和尚示寂之辰常住營備齋羞以伸供養比丘衆諷誦經文稱揚聖號所集殊勳奉為真慈增崇品位伏願曇華出現重開覺苑之春慧日長明永燭昏衢之夜十方三世云云藏諸祖忌道行崇重功宰山門隔日法堂鋪設不可越例若例祖忌如常粥罷諷經當請牌座法堂敷設供養依法上香住持兩班展拜侍者班尾拜或大衆拜有處只就祖堂下食一分諷經甚非禮也回向仰冀真慈俯垂照鑑今月日山門伏值前住當山第巳代某人和尚示寂之辰營備香羞以伸供養諷誦經文稱揚聖號所集殊勛奉為真慈增崇品位十方三世云云閏嗣法師忌先德唯以弘闡宗乘發明自己誨示方來知有授受以報德也禪宗近代大川做浙翁和尚忌橫川做天目和尚忌方丈設位置食一分燒香一炷大展九拜不許諷經二大老深有意焉然尊師重道禮不可虧忌辰須設供衣閣中預計錢物歸常住置祭設供法堂鋪陳法座挂真與南山忌同但不做禮須請時為湯請名德西堂光伴到坐其右無則己之住持行禮鳴鼓三下退座堂司行者覆參前諷經挂牌報諸寮并報來日半齋各具威儀散忌諷經昏鐘鳴集衆諷經侍者令方丈客頭預請兩班耆舊伴真湯果於法堂上間設位行者計位鋪排如法眷屬尊長同門兄弟皆當請之小師師孫不可同食僧衆諷經散侍者揖請兩班耆舊住持引入座坐定住持離位進前上香上湯復位侍者燒香下湯行湯果次早粥罷上香上湯住持展拜僧衆諷經回向鄉人法眷隨即舉經半齋鳴僧堂前鐘集衆與南山忌同住持上香展具三拜不收具上湯進食侍者下竟三拜燒香下嚫點茶大衆同展三拜蓋在座下皆曰參學故也鳴鼓三下講特為禮退座收具舉經回向而散凡諷經時住持即在真左有法眷同列齋時入堂住持燒香一炷大展三拜入位侍者行嚫多見法堂諷經俵嚫甚非所宜餘九祖頌法正為初二法時三聰四覆五光隨六雲洪七八智首九祖南山皆聖師九祖聖師豈可稱其單諱為此頌者乃便於後人記持耳非慢也今列之于后初祖法正尊者二法時律師三法聰律師四道覆律師五慧光律師六道雲律師七道洪律師八智首律師九南山律師成送法衣專使首到客司人事知客同專使上侍司煩通報方丈或即相接或在來早侍者令客頭報請兩班專使插香先通客禮起爐前謝茶畢再插香三拜免則止之柈袱托呈法衣信物入座光伴獻茶罷轉特為位獻湯兩班同送安下處侍者引巡寮別日致祭拈衣有佛事禮與下遺書同
